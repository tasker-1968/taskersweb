<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Redirigiendo | Tasker's México</title>
    
    <!-- Anti-caché -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fuente Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * { font-family: 'Inter', sans-serif; }
        
        .gradient-bg {
            background: linear-gradient(135deg, #0A2540 0%, #1B4F72 50%, #2E86C1 100%);
            animation: gradient 10s ease infinite;
            background-size: 200% 200%;
        }
        
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .loader {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-bottom-color: #fff;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }
        
        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .pulse {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        @media (max-width: 640px) {
            .glass-card {
                margin: 1rem;
                padding: 1.5rem;
            }
            .loader {
                width: 40px;
                height: 40px;
            }
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white/95 backdrop-blur-sm rounded-2xl shadow-2xl p-6 md:p-8 text-center fade-in">
        <!-- Logo -->
        <div class="flex justify-center mb-6">
            <img src="logo-taskers.png" alt="Tasker's México" class="h-12 md:h-14 w-auto">
        </div>
        
        <!-- Loader -->
        <div class="flex justify-center my-6 md:my-8">
            <span class="loader"></span>
        </div>
        
        <!-- Mensaje principal -->
        <h1 class="text-xl md:text-2xl font-bold text-slate-800 mb-2">
            Procesando tu acceso
        </h1>
        
        <p class="text-slate-500 text-sm mb-4 pulse" id="mensajeEstado">
            Estamos verificando tu cuenta...
        </p>
        
        <div class="w-full bg-slate-100 rounded-full h-1.5 mb-6 overflow-hidden">
            <div class="bg-[#1B4F72] h-1.5 rounded-full transition-all duration-300" id="progressBar" style="width: 0%"></div>
        </div>
        
        <!-- Mensaje de error (oculto por defecto) -->
        <div id="errorMessage" class="hidden bg-red-50 border border-red-200 rounded-xl p-4 mb-4">
            <div class="flex items-center gap-3">
                <div class="bg-red-100 rounded-full p-2">
                    <i class="fas fa-exclamation-triangle text-red-600"></i>
                </div>
                <div class="text-left">
                    <h3 class="font-bold text-red-800 text-sm">Error de redirección</h3>
                    <p id="errorText" class="text-xs text-red-600"></p>
                </div>
            </div>
        </div>
        
        <!-- Botón manual (solo si hay error) -->
        <div id="manualRedirect" class="hidden">
            <p class="text-xs text-slate-500 mb-3">Si no eres redirigido automáticamente:</p>
            <a href="dashboard-cliente.html" class="inline-block bg-[#1B4F72] text-white px-5 py-2.5 rounded-xl font-semibold text-sm hover:bg-[#2E86C1] transition shadow-md">
                <i class="fas fa-arrow-right mr-2"></i>Ir a mi panel
            </a>
        </div>
        
        <!-- Pie de página -->
        <p class="text-xs text-slate-400 mt-6">
            <i class="fas fa-shield-alt text-[#1B4F72] mr-1"></i>
            Tu información está segura con nosotros
        </p>
    </div>

    <script>
        // =============================================
        // CONFIGURACIÓN DE SUPABASE
        // =============================================
        const SUPABASE_URL = 'https://ayhflwricnkptoinabhe.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF5aGZsd3JpY25rcHRvaW5hYmhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NTI0OTksImV4cCI6MjA4ODMyODQ5OX0.m5LaJmQVqoiBCbxYJ3ZGEV5x2c4oGjK9iHKtAfcc21M';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let progressInterval;
        let currentProgress = 0;
        
        function iniciarProgressBar() {
            progressInterval = setInterval(() => {
                if (currentProgress < 90) {
                    currentProgress += 10;
                    document.getElementById('progressBar').style.width = currentProgress + '%';
                }
            }, 300);
        }
        
        function completarProgressBar() {
            clearInterval(progressInterval);
            document.getElementById('progressBar').style.width = '100%';
        }
        
        function actualizarMensaje(mensaje) {
            const mensajeEl = document.getElementById('mensajeEstado');
            if (mensajeEl) mensajeEl.textContent = mensaje;
        }

        // =============================================
        // FUNCIÓN PRINCIPAL DE REDIRECCIÓN
        // =============================================
        async function handleRedirect() {
            iniciarProgressBar();
            
            try {
                console.log('🔍 Iniciando proceso de redirección...');
                actualizarMensaje('Verificando tu sesión...');
                
                // 1. Obtener la sesión actual
                const { data: { session }, error: sessionError } = await supabase.auth.getSession();
                
                if (sessionError) throw sessionError;
                
                // 2. Si no hay sesión, redirigir al login
                if (!session) {
                    console.log('⚠️ No hay sesión activa, redirigiendo a login...');
                    actualizarMensaje('No encontramos una sesión activa. Redirigiendo...');
                    completarProgressBar();
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                    return;
                }

                console.log('✅ Sesión encontrada:', session.user.email);
                actualizarMensaje(`Bienvenido ${session.user.email.split('@')[0]}...`);

                // 3. Obtener el perfil del usuario
                const { data: profile, error: profileError } = await supabase
                    .from('profiles')
                    .select('role')
                    .eq('id', session.user.id)
                    .maybeSingle();

                if (profileError) {
                    console.error('❌ Error al obtener perfil:', profileError);
                    throw profileError;
                }

                // 4. Si no hay perfil, crearlo automáticamente (por si acaso)
                if (!profile) {
                    actualizarMensaje('Configurando tu perfil por primera vez...');
                    console.log('📝 Creando perfil para usuario OAuth...');
                    
                    const { error: insertError } = await supabase
                        .from('profiles')
                        .insert([{
                            id: session.user.id,
                            email: session.user.email,
                            full_name: session.user.user_metadata?.full_name || session.user.email.split('@')[0],
                            role: 'client',
                            status: 'active',
                            created_at: new Date(),
                            updated_at: new Date()
                        }]);
                    
                    if (insertError) {
                        console.error('Error al crear perfil:', insertError);
                    }
                }

                // 5. Determinar la URL según el rol
                let redirectUrl = 'dashboard-cliente.html';
                let rolTexto = 'cliente';
                
                if (profile?.role === 'tasker') {
                    redirectUrl = 'dashboard-tasker.html';
                    rolTexto = 'profesional';
                } else if (profile?.role === 'admin') {
                    redirectUrl = 'admin.html';
                    rolTexto = 'administrador';
                }

                console.log('🎯 Redirigiendo a panel de', rolTexto, ':', redirectUrl);
                actualizarMensaje(`Redirigiendo a tu panel de ${rolTexto}...`);
                completarProgressBar();

                // 6. Redirigir después de 1.5 segundos
                setTimeout(() => {
                    window.location.href = redirectUrl;
                }, 1500);

            } catch (error) {
                console.error('🔥 Error en redirección:', error);
                completarProgressBar();
                
                // Mostrar mensaje de error
                document.getElementById('errorMessage').classList.remove('hidden');
                document.getElementById('errorText').textContent = error.message || 'Error al procesar la autenticación';
                actualizarMensaje('Ocurrió un error. Por favor intenta de nuevo.');
                
                // Mostrar opción manual
                document.getElementById('manualRedirect').classList.remove('hidden');
            }
        }

        // =============================================
        // INICIAR PROCESO AL CARGAR LA PÁGINA
        // =============================================
        document.addEventListener('DOMContentLoaded', handleRedirect);

        // =============================================
        // RESPALDO: Si no hay redirección en 8 segundos
        // =============================================
        setTimeout(() => {
            const manualDiv = document.getElementById('manualRedirect');
            if (manualDiv.classList.contains('hidden')) {
                manualDiv.classList.remove('hidden');
                document.getElementById('errorMessage').classList.remove('hidden');
                document.getElementById('errorText').textContent = 'Tiempo de espera agotado. Haz clic en el botón para continuar.';
                actualizarMensaje('La redirección está tomando más tiempo de lo normal.');
            }
        }, 8000);
    </script>
</body>
</html>
