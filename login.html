<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Tasker's México</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-blue-600 to-blue-800 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-slate-800">Bienvenido</h1>
            <p class="text-slate-500 mt-2">Accede a tu cuenta de Tasker's</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-2">Correo electrónico</label>
                <input type="email" id="email" required 
                    class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                    placeholder="tucorreo@ejemplo.com">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-600 mb-2">Contraseña</label>
                <input type="password" id="password" required 
                    class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                    placeholder="••••••••">
            </div>

            <button type="submit" id="loginBtn" 
                class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-lg hover:bg-blue-700 transition-all shadow-lg shadow-blue-200">
                Iniciar sesión
            </button>
        </form>

        <p class="text-center text-sm text-slate-500 mt-8">
            ¿No tienes cuenta? 
            <a href="registro-clientes.html" class="text-blue-600 hover:underline">Regístrate como cliente</a>
            <span class="mx-2">|</span>
            <a href="registro-taskers.html" class="text-blue-600 hover:underline">como profesional</a>
        </p>
    </div>

    <script>
        // =============================================
        // LOGIN CORREGIDO
        // =============================================
        
        const SUPABASE_URL = 'https://ayhflwricnkptoinabhe.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF5aGZsd3JpY25rcHRvaW5hYmhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NTI0OTksImV4cCI6MjA4ODMyODQ5OX0.m5LaJmQVqoiBCbxYJ3ZGEV5x2c4oGjK9iHKtAfcc21M';

        // Inicializar
        let supabaseClient = null;
        
        try {
            if (typeof window.supabase !== 'undefined') {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log('✅ Supabase listo');
            } else {
                console.error('❌ Supabase no cargado');
            }
        } catch (e) {
            console.error('Error:', e);
        }

        // Login form
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!supabaseClient) {
                alert('Error: Supabase no está disponible');
                return;
            }

            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Ingresando...';

            try {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email, password
                });

                if (error) throw error;

                const { data: profile, error: profileError } = await supabaseClient
                    .from('profiles')
                    .select('role')
                    .eq('id', data.user.id)
                    .single();

                if (profileError) throw profileError;

                switch(profile?.role) {
                    case 'admin':
                        window.location.href = 'admin.html';
                        break;
                    case 'tasker':
                        window.location.href = 'dashboard-tasker.html';
                        break;
                    default:
                        window.location.href = 'dashboard-cliente.html';
                        break;
                }

            } catch (error) {
                alert('Error: ' + error.message);
                btn.disabled = false;
                btn.innerHTML = 'Iniciar sesión';
            }
        });
    </script>
</body>
</html>
