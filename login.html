<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Iniciar Sesión | Tasker's México</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #3b82f6 100%);
            min-height: 100vh;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 32px;
            max-width: 420px;
            width: 100%;
            margin: 0 auto;
        }
        
        .input-moderno {
            transition: all 0.2s ease;
        }
        
        .input-moderno:focus {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(59, 130, 246, 0.4);
        }
        
        .btn-volver {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 50;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            padding: 10px 16px;
            border-radius: 40px;
            color: white;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .btn-volver:hover {
            background: rgba(255,255,255,0.2);
        }
        
        @media (max-width: 640px) {
            .glass-card {
                margin: 16px;
                padding: 24px;
            }
            .btn-volver {
                top: 12px;
                left: 12px;
                padding: 8px 12px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <!-- Botón volver -->
    <a href="index.html" class="btn-volver flex items-center gap-2">
        <i class="fas fa-arrow-left"></i> Volver al inicio
    </a>

    <div class="glass-card p-8">
        
        <!-- Logo -->
        <div class="flex justify-center mb-6">
            <div class="w-14 h-14 bg-gradient-to-r from-blue-600 to-blue-500 rounded-2xl flex items-center justify-center shadow-lg">
                <span class="text-white font-bold text-2xl">T</span>
            </div>
        </div>

        <!-- Header -->
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-slate-800 mb-2">¡Bienvenido de vuelta!</h1>
            <p class="text-sm text-slate-500">Accede a tu cuenta para gestionar tus servicios</p>
        </div>

        <!-- Formulario -->
        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-xs font-bold uppercase text-slate-400 mb-1 tracking-wider">
                    <i class="fas fa-envelope mr-1"></i> Correo Electrónico
                </label>
                <input type="email" id="email" required 
                    class="input-moderno w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition"
                    placeholder="tu@email.com">
            </div>

            <div>
                <label class="block text-xs font-bold uppercase text-slate-400 mb-1 tracking-wider">
                    <i class="fas fa-lock mr-1"></i> Contraseña
                </label>
                <div class="relative">
                    <input type="password" id="password" required 
                        class="input-moderno w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition pr-12"
                        placeholder="••••••••">
                    <button type="button" onclick="togglePassword()" 
                        class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-blue-600 transition">
                        <i id="passwordIcon" class="fas fa-eye-slash text-lg"></i>
                    </button>
                </div>
            </div>

            <div class="flex justify-between items-center text-sm">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="rememberMe" class="w-4 h-4 text-blue-600 rounded">
                    <span class="text-slate-600">Recordar cuenta</span>
                </label>
                <a href="#" class="text-blue-600 hover:text-blue-700 hover:underline">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" id="loginBtn" 
                class="w-full bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-700 hover:to-blue-600 text-white py-3 rounded-xl font-bold text-base transition-all shadow-lg flex items-center justify-center gap-2">
                <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
            </button>
        </form>

        <!-- Divisor -->
        <div class="relative my-6">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-slate-200"></div>
            </div>
            <div class="relative flex justify-center">
                <span class="bg-white px-4 text-xs text-slate-400">O continúa con</span>
            </div>
        </div>

        <!-- Proveedores -->
        <div class="grid grid-cols-2 gap-3">
            <button onclick="loginWithProvider('google')" 
                class="flex items-center justify-center gap-2 px-4 py-2 border border-slate-200 rounded-xl hover:bg-slate-50 transition">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google">
                <span class="text-sm font-medium">Google</span>
            </button>
            <button onclick="loginWithProvider('facebook')" 
                class="flex items-center justify-center gap-2 px-4 py-2 border border-slate-200 rounded-xl hover:bg-slate-50 transition">
                <img src="https://www.svgrepo.com/show/475647/facebook-color.svg" class="w-5 h-5" alt="Facebook">
                <span class="text-sm font-medium">Facebook</span>
            </button>
        </div>

        <!-- Registro -->
        <div class="mt-6 text-center space-y-2">
            <p class="text-sm text-slate-500">
                ¿No tienes cuenta? 
                <a href="registro-clientes.html" class="text-blue-600 hover:underline font-medium">Regístrate como Cliente</a>
            </p>
            <p class="text-sm text-slate-500">
                ¿Eres profesional? 
                <a href="registro-taskers.html" class="text-blue-600 hover:underline font-medium">Regístrate como Tasker</a>
            </p>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        // Mostrar/ocultar contraseña
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('passwordIcon');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            }
        }

        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const supabase = initSupabase();
            if (!supabase) {
                mostrarToast('Error al conectar con el servidor', 'error');
                return;
            }

            const btn = document.getElementById('loginBtn');
            const originalText = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Ingresando...';

            try {
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;

                const { data, error } = await supabase.auth.signInWithPassword({
                    email, password
                });

                if (error) throw error;

                // Obtener perfil
                let { data: profile, error: profileError } = await supabase
                    .from('profiles')
                    .select('role')
                    .eq('id', data.user.id)
                    .maybeSingle();

                // Si no hay perfil, crearlo
                if (!profile && !profileError) {
                    const nombre = email.split('@')[0];
                    await supabase.from('profiles').insert([{
                        id: data.user.id,
                        email: email,
                        full_name: nombre,
                        role: 'client',
                        status: 'active',
                        created_at: new Date()
                    }]);
                    profile = { role: 'client' };
                }

                let redirectUrl = 'dashboard-cliente.html';
                if (profile?.role === 'tasker') redirectUrl = 'dashboard-tasker.html';
                if (profile?.role === 'admin') redirectUrl = 'admin.html';

                mostrarToast('¡Bienvenido!', 'success');
                setTimeout(() => window.location.href = redirectUrl, 1000);

            } catch (error) {
                let mensaje = 'Error al iniciar sesión';
                if (error.message.includes('Invalid login credentials')) {
                    mensaje = 'Correo o contraseña incorrectos';
                }
                mostrarToast(mensaje, 'error');
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });

        // Recordar email
        const savedEmail = localStorage.getItem('taskers_email');
        if (savedEmail) {
            document.getElementById('email').value = savedEmail;
            document.getElementById('rememberMe').checked = true;
        }

        document.getElementById('rememberMe').addEventListener('change', (e) => {
            const email = document.getElementById('email').value;
            if (e.target.checked && email) {
                localStorage.setItem('taskers_email', email);
            } else {
                localStorage.removeItem('taskers_email');
            }
        });

        // Login con proveedores
        async function loginWithProvider(provider) {
            const supabase = initSupabase();
            if (!supabase) return;
            
            mostrarCarga('Conectando...');
            const { error } = await supabase.auth.signInWithOAuth({
                provider: provider,
                options: { redirectTo: window.location.origin + '/dashboard-redirect.html' }
            });
            ocultarCarga();
            if (error) mostrarToast('Error: ' + error.message, 'error');
        }
    </script>
</body>
</html>
