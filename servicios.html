<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar Servicio | Tasker's México</title>
    
    <!-- Anti-caché -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
        .hero-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
        .input-focus { transition: all 0.3s ease; border: 2px solid transparent; }
        .input-focus:focus { transform: translateY(-2px); border-color: #3b82f6; box-shadow: 0 10px 20px -10px rgba(59,130,246,0.5); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200">
        <div class="container mx-auto px-4 sm:px-6">
            <div class="flex justify-between items-center h-16 sm:h-20">
                <a href="index.html" class="flex items-center gap-2">
                    <img src="logo-taskers.png" alt="Tasker's" class="h-8 sm:h-10 w-auto">
                    <span class="text-blue-600 font-bold text-lg hidden sm:inline">Tasker's</span>
                </a>
                <button onclick="window.history.back()" class="flex items-center gap-2 text-slate-600 hover:text-blue-600 transition bg-slate-100 px-4 py-2 rounded-xl">
                    <i class="fas fa-arrow-left"></i>
                    <span class="hidden sm:inline">Volver</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 sm:px-6 py-8 sm:py-12 max-w-2xl">
        <div class="hero-gradient rounded-3xl p-6 sm:p-8 text-white mb-6 shadow-xl">
            <div class="inline-flex items-center gap-2 bg-white/20 backdrop-blur-sm px-4 py-2 rounded-full text-sm font-semibold mb-4">
                <i class="fas fa-tag"></i>
                <span id="display-cat">Categoría</span>
            </div>
            <h2 id="display-sub" class="text-2xl sm:text-3xl font-extrabold mb-2">Cargando servicio...</h2>
            <p class="text-sm text-blue-100">Describe tu necesidad y recibe propuestas de profesionales verificados.</p>
        </div>

        <div class="bg-white rounded-2xl border border-slate-200 shadow-lg p-6 sm:p-8">
            <form id="serviceForm" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Descripción</label>
                    <textarea id="descripcion" required rows="4" class="input-focus w-full p-4 bg-slate-50 border rounded-xl" placeholder="Ej: Necesito reparar una fuga de agua..."></textarea>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Ubicación</label>
                    <input type="text" id="ubicacion" required class="input-focus w-full p-4 bg-slate-50 border rounded-xl" placeholder="Colonia o zona">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Presupuesto ($MXN)</label>
                    <input type="number" id="monto" required min="100" step="100" class="input-focus w-full p-4 bg-slate-50 border rounded-xl" placeholder="0.00">
                    <p class="text-xs text-slate-400 mt-2">Comisión Tasker's: 15%</p>
                </div>
                <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg">
                    Publicar Solicitud
                </button>
            </form>
        </div>

        <div class="mt-6 flex items-center justify-center gap-3 text-slate-400 text-sm">
            <i class="fas fa-shield-alt text-2xl text-blue-600"></i>
            <p>Tu pago está protegido hasta que confirmes la entrega.</p>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://ayhflwricnkptoinabhe.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF5aGZsd3JpY25rcHRvaW5hYmhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NTI0OTksImV4cCI6MjA4ODMyODQ5OX0.m5LaJmQVqoiBCbxYJ3ZGEV5x2c4oGjK9iHKtAfcc21M';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('display-cat').innerText = urlParams.get('cat') || 'General';
        document.getElementById('display-sub').innerText = urlParams.get('sub') || 'Nuevo Servicio';

        document.getElementById('serviceForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = 'Publicando...';

            const { data: { user } } = await supabase.auth.getUser();
            if (!user) { alert('Debes iniciar sesión'); window.location.href = 'login.html'; return; }

            const { error } = await supabase.from('servicios').insert([{
                cliente_id: user.id,
                categoria: urlParams.get('cat'),
                subcategoria: urlParams.get('sub'),
                descripcion: document.getElementById('descripcion').value,
                ubicacion: document.getElementById('ubicacion').value,
                monto_ofertado: parseFloat(document.getElementById('monto').value),
                status: 'pendiente_pago'
            }]);

            if (error) { alert('Error: ' + error.message); btn.disabled = false; btn.innerText = 'Publicar Solicitud'; } 
            else { alert('Solicitud publicada'); window.location.href = 'dashboard-cliente.html'; }
        });
    </script>
</body>
</html>
