<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Servicio | Tasker's México</title>
    
    <!-- Anti-caché -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <!-- Tailwind CSS y Fuentes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .hero-gradient {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
        }
        
        .fade-in {
            animation: fadeIn 0.6s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .service-card {
            transition: all 0.3s ease;
        }
        
        .service-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(59, 130, 246, 0.2);
        }
        
        @media (max-width: 640px) {
            .hero-gradient {
                border-radius: 1.5rem;
            }
        }
        
        .animate-spin {
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .btn-ripple {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .btn-ripple::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 5px;
            height: 5px;
            background: rgba(255, 255, 255, 0.5);
            opacity: 0;
            border-radius: 100%;
            transform: scale(1, 1) translate(-50%);
            transform-origin: 50% 50%;
        }
        
        .btn-ripple:hover::after {
            animation: ripple 0.6s ease-out;
        }
        
        @keyframes ripple {
            0% { transform: scale(0, 0); opacity: 0.5; }
            100% { transform: scale(20, 20); opacity: 0; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- Navbar -->
    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200">
        <div class="container mx-auto px-4 sm:px-6">
            <div class="flex justify-between items-center h-16 sm:h-20">
                <a href="index.html" class="flex items-center gap-2">
                    <img src="logo-taskers.png" alt="Tasker's" class="h-8 sm:h-10 w-auto">
                    <span class="text-blue-600 font-bold text-lg hidden sm:inline">Tasker's</span>
                </a>
                <div id="navButtons" class="flex items-center gap-3"></div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 sm:px-6 py-8 sm:py-12 max-w-4xl">
        
        <div id="contenido-servicio" class="fade-in">
            <div class="text-center py-12">
                <i class="fas fa-spinner fa-spin text-4xl text-blue-600"></i>
                <p class="text-slate-500 mt-4">Cargando información del servicio...</p>
            </div>
        </div>

        <div id="servicios-relacionados" class="mt-12"></div>
    </main>

    <!-- Modal de Diagnóstico -->
    <div id="diagnosticoModal" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-md w-full max-h-[90vh] overflow-y-auto">
            <div class="p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-bold text-slate-800">Solicitar Diagnóstico</h3>
                    <button onclick="cerrarDiagnosticoModal()" class="text-slate-400 hover:text-slate-600">
                        <i class="fas fa-times text-2xl"></i>
                    </button>
                </div>
                <div id="diagnosticoContenido" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <script>
        // =============================================
        // CONFIGURACIÓN SUPABASE
        // =============================================
        const SUPABASE_URL = 'https://ayhflwricnkptoinabhe.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF5aGZsd3JpY25rcHRvaW5hYmhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NTI0OTksImV4cCI6MjA4ODMyODQ5OX0.m5LaJmQVqoiBCbxYJ3ZGEV5x2c4oGjK9iHKtAfcc21M';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Precios de diagnóstico por especialidad
        const preciosDiagnostico = {
            'Plomería': 250,
            'Electricidad': 250,
            'Carpintería': 200,
            'Albañilería': 300,
            'Pintura': 200,
            'Impermeabilización': 350,
            'Cerrajería': 200,
            'Herrería': 250,
            'Aluminio y Vidrio': 250,
            'Limpieza de Hogar': 200,
            'Limpieza de Oficinas': 250,
            'Lavado de Salas/Alfombras': 300,
            'Limpieza Post-Obra': 350,
            'Sanitización': 250,
            'Limpieza de Vidrios': 200,
            'Limpieza Profunda': 300,
            'Mecánica Automotriz': 350,
            'Reparación de llantas': 200,
            'Mudanzas': 300,
            'Reparación de línea blanca': 350,
            'Soporte Técnico': 300,
            'Fumigación': 350,
            'Chefs': 400
        };

        // =============================================
        // VERIFICAR AUTENTICACIÓN
        // =============================================
        async function checkAuth() {
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                const navButtons = document.getElementById('navButtons');
                
                if (session) {
                    const { data: profile } = await supabaseClient
                        .from('profiles')
                        .select('role')
                        .eq('id', session.user.id)
                        .single();
                    
                    let dashboardLink = 'dashboard-cliente.html';
                    if (profile?.role === 'tasker') dashboardLink = 'dashboard-tasker.html';
                    if (profile?.role === 'admin') dashboardLink = 'admin.html';
                    
                    navButtons.innerHTML = `
                        <a href="${dashboardLink}" class="text-blue-600 hover:text-blue-800 font-semibold text-sm sm:text-base">Mi Panel</a>
                        <button onclick="cerrarSesion()" class="text-red-600 hover:text-red-800 font-semibold text-sm sm:text-base">Salir</button>
                    `;
                    return true;
                } else {
                    navButtons.innerHTML = `
                        <a href="login.html" class="text-blue-600 hover:text-blue-800 font-semibold text-sm sm:text-base">Iniciar sesión</a>
                        <a href="registro-clientes.html" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm sm:text-base hover:bg-blue-700 transition shadow-lg">Registrarse</a>
                    `;
                    return false;
                }
            } catch (error) {
                console.error('Error en auth:', error);
                return false;
            }
        }

        window.cerrarSesion = async function() {
            await supabaseClient.auth.signOut();
            window.location.reload();
        };

        // =============================================
        // CARGAR SERVICIO
        // =============================================
        function cargarServicio() {
            const urlParams = new URLSearchParams(window.location.search);
            const servicio = urlParams.get('sub') || 'Servicio';
            
            const precioDiagnostico = preciosDiagnostico[servicio] || 250;
            const iconoMap = {
                'Plomería': 'fa-wrench', 'Electricidad': 'fa-bolt', 'Carpintería': 'fa-hammer',
                'Albañilería': 'fa-trowel', 'Pintura': 'fa-paint-roller', 'Cerrajería': 'fa-key',
                'Mecánica Automotriz': 'fa-car', 'Mudanzas': 'fa-truck', 'Soporte Técnico': 'fa-laptop',
                'Chefs': 'fa-utensils', 'Limpieza de Hogar': 'fa-broom'
            };
            const icono = iconoMap[servicio] || 'fa-briefcase';
            
            const contenido = document.getElementById('contenido-servicio');
            
            contenido.innerHTML = `
                <div class="hero-gradient rounded-3xl p-6 sm:p-8 text-white mb-8 shadow-xl">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="bg-white/20 p-3 rounded-2xl">
                            <i class="fas ${icono} text-2xl sm:text-3xl"></i>
                        </div>
                        <div>
                            <h1 class="text-2xl sm:text-3xl font-bold">${servicio}</h1>
                            <p class="text-sm text-blue-200 mt-1">Diagnóstico + Cotización</p>
                        </div>
                    </div>
                </div>

                <div class="grid md:grid-cols-3 gap-6">
                    <div class="md:col-span-2">
                        <div class="bg-white rounded-2xl shadow-sm p-6">
                            <h2 class="text-xl font-bold text-slate-800 mb-4">¿Cómo funciona?</h2>
                            
                            <div class="space-y-4">
                                <div class="flex gap-4 items-start">
                                    <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center flex-shrink-0">
                                        <span class="text-blue-600 font-bold">1</span>
                                    </div>
                                    <div>
                                        <h3 class="font-semibold text-slate-800">Solicita diagnóstico</h3>
                                        <p class="text-sm text-slate-500">Paga el diagnóstico ($${precioDiagnostico}) y agenda la visita del profesional</p>
                                    </div>
                                </div>
                                <div class="flex gap-4 items-start">
                                    <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center flex-shrink-0">
                                        <span class="text-blue-600 font-bold">2</span>
                                    </div>
                                    <div>
                                        <h3 class="font-semibold text-slate-800">Recibe diagnóstico y cotización</h3>
                                        <p class="text-sm text-slate-500">El tasker evalúa el problema y te envía una cotización detallada</p>
                                    </div>
                                </div>
                                <div class="flex gap-4 items-start">
                                    <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center flex-shrink-0">
                                        <span class="text-blue-600 font-bold">3</span>
                                    </div>
                                    <div>
                                        <h3 class="font-semibold text-slate-800">Aprueba y ejecuta</h3>
                                        <p class="text-sm text-slate-500">Si aceptas, pagas el adicional y el tasker realiza el trabajo</p>
                                    </div>
                                </div>
                                <div class="flex gap-4 items-start">
                                    <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center flex-shrink-0">
                                        <span class="text-blue-600 font-bold">4</span>
                                    </div>
                                    <div>
                                        <h3 class="font-semibold text-slate-800">Califica y libera pago</h3>
                                        <p class="text-sm text-slate-500">Al finalizar, califica al tasker y se libera su pago</p>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="mt-6 p-4 bg-yellow-50 rounded-xl border border-yellow-200">
                                <div class="flex gap-2 text-sm text-yellow-800">
                                    <i class="fas fa-info-circle mt-0.5"></i>
                                    <p>El diagnóstico es pagado por separado. Si decides continuar con la reparación, el costo del diagnóstico se descuenta del total.</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div>
                        <div class="bg-white rounded-2xl shadow-sm p-6 sticky top-24">
                            <div class="text-center mb-6">
                                <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <i class="fas fa-stethoscope text-2xl text-blue-600"></i>
                                </div>
                                <h3 class="text-lg font-bold text-slate-800">Diagnóstico</h3>
                                <p class="text-3xl font-bold text-blue-600 mt-2">$${precioDiagnostico}</p>
                                <p class="text-xs text-slate-500">Pago único, no reembolsable</p>
                            </div>

                            <div class="space-y-3">
                                <button onclick="solicitarDiagnostico('${servicio}', ${precioDiagnostico})" 
                                        id="btnDiagnostico"
                                        class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg">
                                    <i class="fas fa-clinic-medical mr-2"></i>Solicitar diagnóstico
                                </button>
                                <a href="login.html" class="block w-full text-center border border-blue-600 text-blue-600 py-3 rounded-xl font-bold hover:bg-blue-50 transition">
                                    Ya tengo cuenta
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // Verificar autenticación para mostrar/ocultar botones
            setTimeout(async () => {
                const isLoggedIn = await checkAuth();
                const btn = document.getElementById('btnDiagnostico');
                if (!isLoggedIn && btn) {
                    btn.onclick = () => window.location.href = 'login.html';
                    btn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>Inicia sesión para solicitar';
                }
            }, 100);
        }

        // =============================================
        // SOLICITAR DIAGNÓSTICO
        // =============================================
        window.solicitarDiagnostico = async function(servicio, precioDiagnostico) {
            const session = await supabaseClient.auth.getSession();
            if (!session.data.session) {
                window.location.href = 'login.html';
                return;
            }
            
            const modal = document.getElementById('diagnosticoModal');
            const contenido = document.getElementById('diagnosticoContenido');
            
            contenido.innerHTML = `
                <form id="formDiagnostico" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Descripción del problema</label>
                        <textarea id="descripcionProblema" rows="3" required 
                            class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500"
                            placeholder="Describe detalladamente el problema que necesitas resolver..."></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-2">Código Postal</label>
                            <input type="text" id="cpDiagnostico" required maxlength="5" class="w-full p-3 border rounded-xl">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-2">Colonia</label>
                            <input type="text" id="coloniaDiagnostico" class="w-full p-3 border rounded-xl">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Fecha deseada</label>
                        <input type="datetime-local" id="fechaDiagnostico" class="w-full p-3 border rounded-xl">
                    </div>
                    <div class="bg-slate-50 p-4 rounded-xl">
                        <div class="flex justify-between text-sm">
                            <span>Diagnóstico:</span>
                            <span class="font-bold">$${precioDiagnostico}</span>
                        </div>
                        <div class="flex justify-between text-sm mt-2 text-slate-500">
                            <span>Comisión Tasker's (15%):</span>
                            <span>$${(precioDiagnostico * 0.15).toFixed(2)}</span>
                        </div>
                        <div class="border-t mt-3 pt-3 flex justify-between font-bold">
                            <span>Total a pagar:</span>
                            <span class="text-blue-600">$${precioDiagnostico}</span>
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition">
                        Pagar $${precioDiagnostico} y solicitar
                    </button>
                </form>
            `;
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            document.getElementById('formDiagnostico').addEventListener('submit', async (e) => {
                e.preventDefault();
                await procesarDiagnostico(servicio, precioDiagnostico);
            });
        };
        
        window.cerrarDiagnosticoModal = function() {
            const modal = document.getElementById('diagnosticoModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        };
        
        async function procesarDiagnostico(servicio, precioDiagnostico) {
            const btn = document.querySelector('#formDiagnostico button');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Procesando...';
            
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (!session) throw new Error('No estás autenticado');
                
                const descripcion = document.getElementById('descripcionProblema').value;
                const cp = document.getElementById('cpDiagnostico').value;
                const colonia = document.getElementById('coloniaDiagnostico').value;
                const fecha = document.getElementById('fechaDiagnostico').value;
                
                // Crear servicio como diagnóstico
                const { data: servicioData, error: servError } = await supabaseClient
                    .from('servicios')
                    .insert([{
                        cliente_id: session.user.id,
                        subcategoria: servicio,
                        descripcion: `[DIAGNÓSTICO] ${descripcion}`,
                        ubicacion: colonia ? `${colonia}, CP ${cp}` : `CP ${cp}`,
                        cp: cp,
                        monto_ofertado: precioDiagnostico,
                        status: 'diagnostico_pendiente',
                        tipo_servicio: 'diagnostico',
                        fecha_solicitada: fecha || null,
                        created_at: new Date()
                    }])
                    .select()
                    .single();
                
                if (servError) throw servError;
                
                // Registrar pago del diagnóstico
                const { error: pagoError } = await supabaseClient
                    .from('pagos')
                    .insert([{
                        servicio_id: servicioData.id,
                        cliente_id: session.user.id,
                        monto_total: precioDiagnostico,
                        comision_taskers: precioDiagnostico * 0.15,
                        monto_tasker: precioDiagnostico * 0.85,
                        status: 'retenido',
                        fecha_pago: new Date()
                    }]);
                
                if (pagoError) throw pagoError;
                
                alert('✅ Diagnóstico solicitado. En breve un tasker se pondrá en contacto.');
                cerrarDiagnosticoModal();
                window.location.href = 'dashboard-cliente.html';
                
            } catch (error) {
                console.error('Error:', error);
                alert('Error: ' + error.message);
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }

        // =============================================
        // INICIALIZAR
        // =============================================
        document.addEventListener('DOMContentLoaded', () => {
            cargarServicio();
            checkAuth();
        });
    </script>
</body>
</html>
