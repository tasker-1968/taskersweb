    <style>
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .hero-gradient {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #3b82f6 100%);
            position: relative;
            overflow: hidden;
        }
        
        .hero-gradient::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="rgba(255,255,255,0.05)" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,122.7C672,117,768,139,864,154.7C960,171,1056,181,1152,165.3C1248,149,1344,107,1392,85.3L1440,64L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') repeat-x bottom;
            background-size: 1440px auto;
            opacity: 0.3;
            pointer-events: none;
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .service-card {
            transition: all 0.3s ease;
        }
        
        .service-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -8px rgba(59, 130, 246, 0.2);
        }
        
        .beneficio-item {
            transition: all 0.2s ease;
        }
        
        .beneficio-item:hover {
            transform: translateX(5px);
            color: #3b82f6;
        }
        
        @media (max-width: 640px) {
            .hero-gradient {
                border-radius: 1.5rem;
            }
            .service-card {
                margin-bottom: 1rem;
            }
        }
        
        .animate-slideIn {
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>

                descripcion: 'Cuidado profesional para tus manos y pies. Técnicas modernas, productos de calidad y diseños exclusivos. Servicio relajante en la comodidad de tu hogar.',
                icono: 'fa-hand-sparkles',
                categoria: 'Belleza',
                categoriaId: 'belleza',
                precioBase: 250,
                beneficios: [
                    'Técnicas avanzadas y modernas',
                    'Productos hipoalergénicos',
                    'Diseños exclusivos personalizados',
                    'Duración garantizada por semanas',
                    'Materiales desechables por seguridad'
                ]
            },
            'Maquillaje Profesional': {
                titulo: 'Maquillaje Profesional para Eventos',
                descripcion: 'Maquillistas con experiencia en eventos sociales, fotografía, producciones y bodas. Looks personalizados según la ocasión y tipo de piel.',
                icono: 'fa-makeup',
                categoria: 'Belleza',
                categoriaId: 'belleza',
                precioBase: 400,
                beneficios: [
                    'Productos de marca profesional',
                    'Prueba de look sin costo',
                    'Respeto y cuidado de la piel',
                    'Duración extendida todo el día',
                    'Maquillaje para todo tipo de piel'
                ]
            },
            'Masajes Relajantes': {
                titulo: 'Masajes Relajantes y Terapéuticos',
                descripcion: 'Terapeutas certificados para aliviar estrés, dolores musculares, contracturas y mejorar tu bienestar general. Ambiente relajante en tu hogar.',
                icono: 'fa-spa',
                categoria: 'Belleza',
                categoriaId: 'belleza',
                precioBase: 450,
                beneficios: [
                    'Técnicas especializadas certificadas',
                    'Ambiente relajante y profesional',
                    'Aceites esenciales incluidos',
                    'Resultados inmediatos y duraderos',
                    'Duración de 60 o 90 minutos'
                ]
            }
        };

        // Descripciones adicionales para servicios que no están en el objeto principal
        const descripcionesExtra = {
            'default': {
                titulo: 'Servicio Profesional',
                descripcion: 'Servicio profesional con personal altamente capacitado y verificado por Tasker\'s México. Calidad garantizada y los mejores precios del mercado.',
                icono: 'fa-briefcase',
                categoria: 'General',
                categoriaId: 'general',
                precioBase: 300,
                beneficios: [
                    'Personal verificado y capacitado',
                    'Garantía de servicio satisfecho',
                    'Precios justos y competitivos',
                    'Resultados garantizados',
                    'Atención personalizada'
                ]
            }
        };

        // =============================================
        // CARGAR SERVICIO SEGÚN URL
        // =============================================
        async function cargarServicio() {
            const urlParams = new URLSearchParams(window.location.search);
            const servicio = decodeURIComponent(urlParams.get('sub') || 'Servicio');
            const categoria = decodeURIComponent(urlParams.get('cat') || 'General');
            
            // Buscar información del servicio
            let info = descripciones[servicio];
            if (!info) {
                // Buscar en categorías si no existe la descripción específica
                for (const [key, value] of Object.entries(descripciones)) {
                    if (key.toLowerCase().includes(servicio.toLowerCase()) || servicio.toLowerCase().includes(key.toLowerCase())) {
                        info = value;
                        break;
                    }
                }
            }
            if (!info) info = descripcionesExtra.default;
            
            // Obtener si el usuario está logueado
            const supabase = initSupabase();
            let usuarioLogueado = null;
            let esCliente = false;
            
            if (supabase) {
                const { data: { session } } = await supabase.auth.getSession();
                if (session) {
                    usuarioLogueado = session.user;
                    const { data: perfil } = await supabase
                        .from('profiles')
                        .select('role')
                        .eq('id', session.user.id)
                        .maybeSingle();
                    esCliente = perfil?.role === 'client';
                }
            }
            
            const contenido = document.getElementById('contenido-servicio');
            const precioBase = info.precioBase || 300;
            const precioConComision = precioBase * 0.15;
            const precioTasker = precioBase * 0.85;
            
            // Hero y contenido principal
            contenido.innerHTML = `
                <div class="hero-gradient rounded-2xl sm:rounded-3xl p-6 sm:p-10 text-white mb-8 shadow-xl">
                    <div class="flex flex-col sm:flex-row items-start sm:items-center gap-4 mb-6">
                        <div class="bg-white/20 p-4 rounded-2xl backdrop-blur-sm">
                            <i class="fas ${info.icono} text-3xl sm:text-4xl"></i>
                        </div>
                        <div>
                            <div class="flex flex-wrap gap-2 mb-2">
                                <span class="text-xs bg-white/20 px-3 py-1 rounded-full">${info.categoria}</span>
                                <span class="text-xs bg-green-500/30 px-3 py-1 rounded-full">Profesional verificado</span>
                            </div>
                            <h1 class="text-2xl sm:text-3xl md:text-4xl font-bold">${info.titulo}</h1>
                            <p class="text-blue-100 mt-2 text-sm">Tasker's México - Calidad garantizada</p>
                        </div>
                    </div>
                </div>

                <div class="grid md:grid-cols-3 gap-6">
                    <!-- Descripción del servicio -->
                    <div class="md:col-span-2">
                        <div class="bg-white rounded-2xl shadow-sm p-6">
                            <h2 class="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2">
                                <i class="fas fa-info-circle text-blue-600"></i>
                                ¿En qué consiste este servicio?
                            </h2>
                            <p class="text-slate-600 leading-relaxed">
                                ${info.descripcion}
                            </p>
                            
                            <div class="mt-6">
                                <h3 class="font-semibold text-slate-800 mb-3 flex items-center gap-2">
                                    <i class="fas fa-check-circle text-green-600"></i>
                                    Beneficios exclusivos:
                                </h3>
                                <ul class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                    ${info.beneficios.map(b => `
                                        <li class="beneficio-item flex items-center gap-2 text-sm text-slate-600 cursor-pointer">
                                            <i class="fas fa-check-circle text-green-500 text-sm"></i>
                                            ${b}
                                        </li>
                                    `).join('')}
                                </ul>
                            </div>
                            
                            <div class="mt-6 p-4 bg-slate-50 rounded-xl">
                                <h3 class="font-semibold text-slate-800 mb-2 flex items-center gap-2">
                                    <i class="fas fa-shield-alt text-blue-600"></i>
                                    Nuestra garantía
                                </h3>
                                <p class="text-sm text-slate-600">
                                    Todos nuestros profesionales están verificados, cuentan con seguro de responsabilidad civil y 
                                    respaldamos su trabajo. Si no estás satisfecho, te devolvemos tu dinero.
                                </p>
                            </div>
                        </div>
                    </div>

                    <!-- Card de contratación -->
                    <div>
                        <div class="bg-white rounded-2xl shadow-sm p-6 sticky top-24">
                            <div class="text-center mb-6">
                                <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <i class="fas fa-tag text-3xl text-blue-600"></i>
                                </div>
                                <h3 class="text-lg font-bold text-slate-800">¿Necesitas este servicio?</h3>
                                <div class="mt-4">
                                    <p class="text-2xl font-bold text-blue-600">$${precioBase.toFixed(2)}</p>
                                    <p class="text-xs text-slate-400">Precio estimado base</p>
                                </div>
                                <div class="mt-3 text-xs text-slate-500">
                                    <p>Comisión Tasker's: $${precioConComision.toFixed(2)} (15%)</p>
                                    <p class="text-green-600">El profesional recibe: $${precioTasker.toFixed(2)}</p>
                                </div>
                            </div>

                            ${usuarioLogueado ? (
                                esCliente ? `
                                    <button onclick="contratarServicio('${servicio}', ${precioBase})" 
                                            class="w-full bg-gradient-to-r from-blue-600 to-blue-500 text-white py-3 rounded-xl font-bold hover:from-blue-700 hover:to-blue-600 transition shadow-lg shadow-blue-200 flex items-center justify-center gap-2">
                                        <i class="fas fa-calendar-check"></i> Solicitar este servicio
                                    </button>
                                    <p class="text-xs text-slate-400 text-center mt-3">
                                        <i class="fas fa-lock text-blue-600"></i> Pago 100% seguro
                                    </p>
                                ` : `
                                    <div class="bg-amber-50 border border-amber-200 rounded-xl p-4 text-center">
                                        <i class="fas fa-info-circle text-amber-600 text-2xl mb-2"></i>
                                        <p class="text-sm text-amber-800 font-medium">Eres un profesional (Tasker)</p>
                                        <p class="text-xs text-amber-600 mt-1">Los taskers no pueden contratar servicios</p>
                                        <a href="dashboard-tasker.html" class="mt-3 inline-block text-blue-600 text-sm hover:underline">Ir a mi panel →</a>
                                    </div>
                                `
                            ) : `
                                <div class="space-y-3">
                                    <a href="registro-clientes.html" 
                                       class="block w-full bg-gradient-to-r from-blue-600 to-blue-500 text-white text-center py-3 rounded-xl font-bold hover:from-blue-700 hover:to-blue-600 transition shadow-lg shadow-blue-200">
                                        <i class="fas fa-user-plus mr-2"></i>Crear cuenta como cliente
                                    </a>
                                    <a href="login.html" 
                                       class="block w-full border border-blue-600 text-blue-600 text-center py-3 rounded-xl font-bold hover:bg-blue-50 transition">
                                        <i class="fas fa-sign-in-alt mr-2"></i>Ya tengo cuenta
                                    </a>
                                </div>
                                <p class="text-xs text-slate-400 text-center mt-4">
                                    Al contratar, aceptas nuestros términos y condiciones
                                </p>
                            `}

                            <div class="mt-6 pt-6 border-t border-slate-100">
                                <div class="flex items-center gap-2 text-xs text-slate-400 justify-center">
                                    <i class="fas fa-clock text-blue-600"></i>
                                    <span>Respuesta en menos de 24 horas</span>
                                </div>
                                <div class="flex items-center gap-2 text-xs text-slate-400 justify-center mt-2">
                                    <i class="fas fa-star text-yellow-500"></i>
                                    <span>Calificación promedio: 4.8/5</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // Cargar servicios relacionados
            await cargarServiciosRelacionados(info.categoriaId, servicio);
        }
        
        // =============================================
        // SERVICIOS RELACIONADOS
        // =============================================
        async function cargarServiciosRelacionados(categoriaId, servicioActual) {
            const relacionadosDiv = document.getElementById('servicios-relacionados');
            
            // Filtrar servicios de la misma categoría
            const serviciosMismaCategoria = Object.entries(descripciones)
                .filter(([key, val]) => val.categoriaId === categoriaId && key !== servicioActual)
                .slice(0, 4);
            
            if (serviciosMismaCategoria.length === 0) {
                relacionadosDiv.innerHTML = '';
                return;
            }
            
            relacionadosDiv.innerHTML = `
                <div class="border-t border-slate-200 pt-8">
                    <h3 class="text-lg font-semibold text-slate-800 mb-4 flex items-center gap-2">
                        <i class="fas fa-star text-yellow-500"></i>
                        Otros servicios que te pueden interesar
                    </h3>
                    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
                        ${serviciosMismaCategoria.map(([key, val]) => `
                            <a href="?cat=${val.categoria}&sub=${encodeURIComponent(key)}" 
                               class="service-card bg-white p-4 rounded-xl shadow-sm hover:shadow-md transition-all block">
                                <div class="w-10 h-10 bg-blue-50 rounded-xl flex items-center justify-center mb-3">
                                    <i class="fas ${val.icono} text-blue-600 text-lg"></i>
                                </div>
                                <h4 class="font-bold text-slate-800 text-sm">${key}</h4>
                                <p class="text-xs text-slate-500 mt-1">Desde $${(val.precioBase || 300).toFixed(2)}</p>
                                <p class="text-xs text-green-600 mt-2 hover:underline">Ver detalles →</p>
                            </a>
                        `).join('')}
                    </div>
                </div>
            `;
        }
        
        // =============================================
        // CONTRATAR SERVICIO
        // =============================================
        window.contratarServicio = async function(servicioNombre, precioBase) {
            // Redirigir al dashboard del cliente con el servicio preseleccionado
            // Esto abrirá el formulario de nuevo servicio con la categoría y subcategoría prellenadas
            window.location.href = `dashboard-cliente.html?servicio=${encodeURIComponent(servicioNombre)}&precio=${precioBase}`;
        };
        
        // =============================================
        // NAVBAR - Verificar usuario
        // =============================================
        async function checkUser() {
            try {
                const supabase = initSupabase();
                if (!supabase) return;
                
                const { data: { session } } = await supabase.auth.getSession();
                const nav = document.getElementById('nav-buttons');
                
                if (session) {
                    const { data: profile } = await supabase
                        .from('profiles')
                        .select('role')
                        .eq('id', session.user.id)
                        .maybeSingle();
                    
                    let dashboardLink = 'dashboard-cliente.html';
                    if (profile?.role === 'tasker') dashboardLink = 'dashboard-tasker.html';
                    if (profile?.role === 'admin') dashboardLink = 'admin.html';
                    
                    nav.innerHTML = `
                        <a href="${dashboardLink}" class="text-sm font-semibold text-slate-700 hover:text-blue-600 transition flex items-center gap-2">
                            <i class="fas fa-tachometer-alt"></i> Mi Panel
                        </a>
                        <button onclick="cerrarSesion()" class="text-sm font-semibold text-red-600 hover:text-red-700 transition flex items-center gap-2">
                            <i class="fas fa-sign-out-alt"></i> Salir
                        </button>
                    `;
                } else {
                    nav.innerHTML = `
                        <a href="login.html" class="text-sm font-semibold text-blue-600 hover:text-blue-700 transition flex items-center gap-2">
                            <i class="fas fa-sign-in-alt"></i> Ingresar
                        </a>
                        <a href="registro-clientes.html" class="hidden sm:flex text-sm font-semibold text-slate-600 border border-slate-300 px-4 py-2 rounded-xl hover:bg-slate-50 transition items-center gap-2">
                            <i class="fas fa-user"></i> Soy Cliente
                        </a>
                        <a href="registro-taskers.html" class="bg-gradient-to-r from-blue-600 to-blue-500 text-white px-4 py-2 rounded-xl font-semibold text-sm hover:shadow-lg transition flex items-center gap-2">
                            <i class="fas fa-briefcase"></i> Soy Tasker
                        </a>
                    `;
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        window.cerrarSesion = async function() {
            if (confirm('¿Cerrar sesión?')) {
                const supabase = initSupabase();
                await supabase.auth.signOut();
                window.location.href = 'index.html';
            }
        };
        
        // =============================================
        // INICIALIZAR
        // =============================================
        document.addEventListener('DOMContentLoaded', () => {
            cargarServicio();
            checkUser();
        });
    </script>
</body>
</html>
