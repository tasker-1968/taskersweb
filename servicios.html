                descripcion: 'Métodos de depilación modernos para pieles sensibles. Resultados suaves y duraderos.',
                icono: 'fa-wax',
                categoria: 'Belleza',
                beneficios: [
                    'Técnicas indoloras',
                    'Productos hipoalergénicos',
                    'Cuidado post-depilación',
                    'Resultados garantizados'
                ]
            },
            'Microblading': {
                titulo: 'Microblading de Cejas',
                descripcion: 'Técnica semipermanente para cejas perfectas. Diseño personalizado y pigmentos naturales.',
                icono: 'fa-eye',
                categoria: 'Belleza',
                beneficios: [
                    'Diseño personalizado',
                    'Pigmentos hipoalergénicos',
                    'Resultados naturales',
                    'Seguimiento incluido'
                ]
            },
            'Tratamientos faciales': {
                titulo: 'Tratamientos Faciales Profesionales',
                descripcion: 'Limpieza profunda, hidratación y rejuvenecimiento facial con productos especializados.',
                icono: 'fa-face-smile',
                categoria: 'Belleza',
                beneficios: [
                    'Análisis de piel',
                    'Productos profesionales',
                    'Resultados visibles',
                    'Cuidado personalizado'
                ]
            }
        };

        // =============================================
        // CARGAR SERVICIO SEGÚN URL
        // =============================================
        function cargarServicio() {
            const urlParams = new URLSearchParams(window.location.search);
            const servicio = urlParams.get('sub') || 'Servicio';
            const categoria = urlParams.get('cat') || 'General';
            
            const info = descripciones[servicio] || {
                titulo: servicio + ' Profesional',
                descripcion: 'Servicio profesional de ' + servicio.toLowerCase() + ' con personal altamente capacitado y verificado por Tasker\'s México.',
                icono: 'fa-briefcase',
                categoria: categoria,
                beneficios: [
                    'Personal verificado',
                    'Garantía de servicio',
                    'Precios justos',
                    'Resultados garantizados'
                ]
            };

            const contenido = document.getElementById('contenido-servicio');
            
            // Hero
            contenido.innerHTML = `
                <div class="hero-gradient rounded-3xl p-8 text-white mb-8 shadow-xl">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="bg-white/20 p-3 rounded-2xl">
                            <i class="fas ${info.icono} text-3xl"></i>
                        </div>
                        <div>
                            <span class="text-sm bg-white/20 px-3 py-1 rounded-full">${info.categoria}</span>
                            <h1 class="text-3xl font-bold mt-2">${info.titulo}</h1>
                        </div>
                    </div>
                </div>

                <!-- Contenido principal -->
                <div class="grid md:grid-cols-3 gap-6">
                    <!-- Descripción del servicio -->
                    <div class="md:col-span-2">
                        <div class="bg-white rounded-2xl shadow-sm p-6">
                            <h2 class="text-xl font-bold text-slate-800 mb-4">¿En qué consiste este servicio?</h2>
                            <p class="text-slate-600 leading-relaxed">
                                ${info.descripcion}
                            </p>
                            
                            <div class="mt-6">
                                <h3 class="font-semibold text-slate-800 mb-3">Beneficios:</h3>
                                <ul class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                    ${info.beneficios.map(b => `
                                        <li class="flex items-center gap-2 text-sm text-slate-600">
                                            <i class="fas fa-check-circle text-green-500"></i>
                                            ${b}
                                        </li>
                                    `).join('')}
                                </ul>
                            </div>
                        </div>
                    </div>

                    <!-- Card de registro -->
                    <div>
                        <div class="bg-white rounded-2xl shadow-sm p-6 sticky top-24">
                            <div class="text-center mb-6">
                                <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <i class="fas fa-user-plus text-3xl text-blue-600"></i>
                                </div>
                                <h3 class="text-lg font-bold text-slate-800">¿Necesitas este servicio?</h3>
                                <p class="text-sm text-slate-500 mt-2">
                                    Para contratar este servicio y recibir propuestas de profesionales verificados, necesitas crear una cuenta.
                                </p>
                            </div>

                            <div class="space-y-3">
                                <a href="registro-clientes.html" 
                                   class="block w-full bg-blue-600 text-white text-center py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg">
                                    Crear cuenta como cliente
                                </a>
                                <a href="login.html" 
                                   class="block w-full border border-blue-600 text-blue-600 text-center py-3 rounded-xl font-bold hover:bg-blue-50 transition">
                                    Ya tengo cuenta
                                </a>
                            </div>

                            <div class="mt-6 pt-6 border-t border-slate-100">
                                <div class="flex items-center gap-2 text-xs text-slate-400">
                                    <i class="fas fa-shield-alt text-blue-600"></i>
                                    <span>Todos nuestros profesionales pasan por un proceso de verificación de identidad y antecedentes.</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // Servicios relacionados
            const relacionados = document.getElementById('servicios-relacionados');
            const serviciosMismaCategoria = Object.entries(descripciones)
                .filter(([key, val]) => val.categoria === info.categoria && key !== servicio)
                .slice(0, 4);

            if (serviciosMismaCategoria.length > 0) {
                relacionados.innerHTML = `
                    <h3 class="text-lg font-semibold text-slate-800 mb-4">Otros servicios que te pueden interesar</h3>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                        ${serviciosMismaCategoria.map(([key, val]) => `
                            <a href="?cat=${info.categoria}&sub=${encodeURIComponent(key)}" 
                               class="bg-white p-4 rounded-xl shadow-sm hover:shadow-md transition text-center service-card">
                                <div class="w-10 h-10 bg-blue-50 rounded-xl flex items-center justify-center mx-auto mb-2">
                                    <i class="fas ${val.icono} text-blue-600"></i>
                                </div>
                                <h4 class="font-medium text-sm">${key}</h4>
                            </a>
                        `).join('')}
                    </div>
                `;
            } else {
                relacionados.innerHTML = '';
            }
        }

        // Cargar servicio al iniciar
        document.addEventListener('DOMContentLoaded', cargarServicio);
    </script>
</body>
</html>
