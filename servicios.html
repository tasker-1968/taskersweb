    <style>
        * { font-family: 'Inter', sans-serif; }
        
        .hero-gradient {

        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .service-card {
            transition: all 0.3s ease;
        }
        
        .service-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 24px -8px rgba(27, 79, 114, 0.2);
        }
        
        .btn-primary {
            background: #1B4F72;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            background: #2E86C1;
            transform: translateY(-2px);
        }
        
        .btn-outline-primary {
            border: 2px solid #1B4F72;
            color: #1B4F72;
            transition: all 0.3s ease;
        }
        
        .btn-outline-primary:hover {
            background: #1B4F72;
            color: white;
            transform: translateY(-2px);
        }
        
        .benefit-item {
            transition: all 0.2s ease;
        }
        
        .benefit-item:hover {
            transform: translateX(5px);
        }
        
        @media (max-width: 768px) {
            .hero-gradient {
                border-radius: 1.5rem;
                margin: 1rem;
            }
            .container {
                padding-left: 1rem;
                padding-right: 1rem;
            }
            button, a, [onclick] {
                min-height: 44px;
            }
        }

                descripcion: 'Terapeutas certificados para aliviar estrés, dolores musculares y mejorar tu bienestar. Múltiples técnicas disponibles.',
                icono: 'fa-spa',
                categoria: 'Belleza',
                precioBase: 400,
                tiempoPromedio: '60 min',
                beneficios: [
                    'Técnicas especializadas (sueco, deportivo)',
                    'Ambiente relajante creado en tu hogar',
                    'Aceites esenciales de calidad',
                    'Resultados inmediatos',
                    'Terapeutas certificados',
                    'Camilla profesional incluida'
                ]
            }
        };

        // =============================================
        // OBTENER SERVICIO DE LA URL
        // =============================================
        function obtenerServicioDeURL() {
            const urlParams = new URLSearchParams(window.location.search);
            const servicio = urlParams.get('sub') || '';
            const categoria = urlParams.get('cat') || 'General';
            return { nombre: decodeURIComponent(servicio), categoria };
        }

        // =============================================
        // VERIFICAR SESIÓN PARA MOSTRAR BOTONES
        // =============================================
        async function verificarSesion() {
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                return !!session;
            } catch {
                return false;
            }
        }

        // =============================================
        // CARGAR CONTENIDO DEL SERVICIO
        // =============================================
        async function cargarServicio() {
            const { nombre, categoria } = obtenerServicioDeURL();
            const info = descripciones[nombre] || {
                titulo: nombre + ' Profesional',
                descripcion: 'Servicio profesional de ' + nombre.toLowerCase() + ' con personal altamente capacitado y verificado por Tasker\'s México. Calidad y confianza garantizada.',
                icono: 'fa-briefcase',
                categoria: categoria,
                precioBase: 350,
                tiempoPromedio: '1-3 horas',
                beneficios: [
                    'Personal verificado con antecedentes',
                    'Garantía de servicio por escrito',
                    'Precios justos y transparentes',
                    'Resultados 100% garantizados',
                    'Atención personalizada',
                    'Seguimiento post-servicio'
                ]
            };

            const estaLogueado = await verificarSesion();
            const contenido = document.getElementById('contenido-servicio');
            
            contenido.innerHTML = `
                <!-- Hero del servicio -->
                <div class="hero-gradient rounded-2xl md:rounded-3xl p-6 md:p-8 text-white mb-6 md:mb-8 shadow-xl">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="bg-white/20 p-3 rounded-2xl">
                            <i class="fas ${info.icono} text-2xl md:text-3xl"></i>
                        </div>
                        <div>
                            <span class="text-xs bg-white/20 px-3 py-1 rounded-full">${info.categoria}</span>
                            <h1 class="text-2xl md:text-3xl lg:text-4xl font-bold mt-2">${info.titulo}</h1>
                        </div>
                    </div>
                </div>

                <!-- Grid principal -->
                <div class="grid md:grid-cols-3 gap-6">
                    <!-- Columna izquierda: descripción y beneficios -->
                    <div class="md:col-span-2">
                        <div class="bg-white rounded-2xl shadow-sm p-5 md:p-6">
                            <h2 class="text-lg md:text-xl font-bold text-slate-800 mb-4 flex items-center gap-2">
                                <i class="fas fa-info-circle text-[#1B4F72]"></i>
                                ¿En qué consiste este servicio?
                            </h2>
                            <p class="text-slate-600 leading-relaxed">
                                ${info.descripcion}
                            </p>
                            
                            <div class="mt-6">
                                <h3 class="font-semibold text-slate-800 mb-3 flex items-center gap-2">
                                    <i class="fas fa-check-circle text-green-600"></i>
                                    Beneficios exclusivos:
                                </h3>
                                <ul class="grid grid-cols-1 md:grid-cols-2 gap-2">
                                    ${info.beneficios.map(b => `
                                        <li class="benefit-item flex items-center gap-2 text-sm text-slate-600 p-2 hover:bg-slate-50 rounded-lg transition">
                                            <i class="fas fa-check-circle text-green-500 text-xs"></i>
                                            ${b}
                                        </li>
                                    `).join('')}
                                </ul>
                            </div>

                            <div class="mt-6 pt-4 border-t border-slate-100">
                                <div class="flex flex-wrap gap-4 text-sm">
                                    <div class="flex items-center gap-2">
                                        <i class="fas fa-clock text-[#1B4F72]"></i>
                                        <span class="text-slate-600">Tiempo estimado: <strong>${info.tiempoPromedio}</strong></span>
                                    </div>
                                    <div class="flex items-center gap-2">
                                        <i class="fas fa-dollar-sign text-[#1B4F72]"></i>
                                        <span class="text-slate-600">Precio base desde: <strong>$${info.precioBase}</strong></span>
                                    </div>
                                    <div class="flex items-center gap-2">
                                        <i class="fas fa-shield-alt text-[#1B4F72]"></i>
                                        <span class="text-slate-600">Profesional verificado</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Columna derecha: CTA -->
                    <div>
                        <div class="bg-white rounded-2xl shadow-sm p-5 md:p-6 sticky top-24">
                            <div class="text-center mb-5">
                                <div class="w-16 h-16 bg-[#1B4F72]/10 rounded-full flex items-center justify-center mx-auto mb-3">
                                    <i class="fas fa-user-plus text-2xl text-[#1B4F72]"></i>
                                </div>
                                <h3 class="text-lg font-bold text-slate-800">¿Necesitas este servicio?</h3>
                                <p class="text-sm text-slate-500 mt-2">
                                    Contrata profesionales verificados y recibe propuestas en minutos.
                                </p>
                            </div>

                            <div class="space-y-3">
                                ${estaLogueado ? `
                                    <a href="dashboard-cliente.html" 
                                       class="block w-full btn-primary text-white text-center py-3 rounded-xl font-bold transition shadow-md">
                                        <i class="fas fa-tachometer-alt mr-2"></i>Ir a mi panel
                                    </a>
                                    <button onclick="solicitarServicio()" 
                                       class="block w-full bg-green-600 text-white text-center py-3 rounded-xl font-bold hover:bg-green-700 transition shadow-md">
                                        <i class="fas fa-plus-circle mr-2"></i>Solicitar este servicio
                                    </button>
                                ` : `
                                    <a href="registro-clientes.html" 
                                       class="block w-full btn-primary text-white text-center py-3 rounded-xl font-bold transition shadow-md">
                                        <i class="fas fa-user-plus mr-2"></i>Crear cuenta como cliente
                                    </a>
                                    <a href="login.html" 
                                       class="block w-full btn-outline-primary text-center py-3 rounded-xl font-bold transition">
                                        <i class="fas fa-sign-in-alt mr-2"></i>Ya tengo cuenta
                                    </a>
                                `}
                            </div>

                            <div class="mt-5 pt-4 border-t border-slate-100">
                                <div class="flex items-start gap-2 text-xs text-slate-400">
                                    <i class="fas fa-shield-alt text-[#1B4F72] mt-0.5"></i>
                                    <span>Todos nuestros profesionales pasan por verificación de identidad y antecedentes penales.</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // =============================================
        // SERVICIOS RELACIONADOS
        // =============================================
        function cargarRelacionados() {
            const { nombre, categoria } = obtenerServicioDeURL();
            const serviciosMismaCategoria = Object.entries(descripciones)
                .filter(([key, val]) => val.categoria === categoria && key !== nombre)
                .slice(0, 4);

            const relacionadosDiv = document.getElementById('servicios-relacionados');
            
            if (serviciosMismaCategoria.length === 0) {
                relacionadosDiv.innerHTML = '';
                return;
            }

            relacionadosDiv.innerHTML = `
                <div class="border-t border-slate-200 pt-6 mt-6">
                    <h3 class="text-lg md:text-xl font-bold text-slate-800 mb-4 flex items-center gap-2">
                        <i class="fas fa-th-large text-[#1B4F72]"></i>
                        Otros servicios que te pueden interesar
                    </h3>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4">
                        ${serviciosMismaCategoria.map(([key, val]) => `
                            <a href="?cat=${encodeURIComponent(categoria)}&sub=${encodeURIComponent(key)}" 
                               class="service-card bg-white p-4 rounded-xl shadow-sm hover:shadow-md transition text-center block">
                                <div class="w-10 h-10 bg-[#1B4F72]/10 rounded-xl flex items-center justify-center mx-auto mb-2">
                                    <i class="fas ${val.icono} text-[#1B4F72] text-lg"></i>
                                </div>
                                <h4 class="font-medium text-sm text-slate-800">${key}</h4>
                                <p class="text-xs text-slate-500 mt-1">Desde $${val.precioBase}</p>
                            </a>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        // =============================================
        // SOLICITAR SERVICIO (REDIRIGIR AL DASHBOARD)
        // =============================================
        window.solicitarServicio = function() {
            const { nombre, categoria } = obtenerServicioDeURL();
            // Guardar en sessionStorage para pre-llenar el formulario
            sessionStorage.setItem('servicioSolicitado', JSON.stringify({
                nombre: nombre,
                categoria: categoria
            }));
            window.location.href = 'dashboard-cliente.html?seccion=nuevo-servicio';
        };

        // =============================================
        // INICIALIZAR
        // =============================================
        document.addEventListener('DOMContentLoaded', async () => {
            await cargarServicio();
            cargarRelacionados();
        });
    </script>
</body>
</html>
