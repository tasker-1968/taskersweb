<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Registro Cliente | Tasker's México</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #3b82f6 100%);
            min-height: 100vh;
        }
        
        /* Contenedor principal que ocupa toda la pantalla */
        .registro-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 80px 16px 32px;
        }
        
        /* Tarjeta con altura ajustable */
        .glass-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 32px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }
        
        /* Scroll SOLO para el contenido del formulario */
        .formulario-scroll {
            max-height: 60vh;
            overflow-y: auto;
            padding-right: 12px;
            margin-right: -4px;
        }
        
        /* Scrollbar personalizado */
        .formulario-scroll::-webkit-scrollbar {
            width: 5px;
        }
        
        .formulario-scroll::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 10px;
        }
        
        .formulario-scroll::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 10px;
        }
        
        .input-moderno {
            transition: all 0.2s ease;
        }
        
        .input-moderno:focus {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(59, 130, 246, 0.4);
        }
        
        /* En móvil, el scroll ocupa menos altura para que se vea el botón */
        @media (max-width: 640px) {
            .registro-container {
                padding: 70px 12px 20px;
            }
            .formulario-scroll {
                max-height: 55vh;
            }
            .glass-card {
                padding: 20px;
            }
        }
        
        /* En tablets */
        @media (min-width: 641px) and (max-width: 1024px) {
            .formulario-scroll {
                max-height: 58vh;
            }
        }
        
        /* En desktop grande */
        @media (min-width: 1025px) {
            .formulario-scroll {
                max-height: 62vh;
            }
        }
        
        .step {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            color: white;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .step.active {
            background: #3b82f6;
            color: white;
            transform: scale(1.1);
        }
        
        .animate-slideIn {
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        /* Botón fijo visualmente dentro del flujo */
        .btn-submit {
            margin-top: 20px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <!-- Navbar simplificado -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-white/10 backdrop-blur-md border-b border-white/20">
        <div class="container mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <a href="index.html" class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-gradient-to-r from-blue-500 to-blue-600 rounded-lg flex items-center justify-center">
                        <span class="text-white font-bold text-lg">T</span>
                    </div>
                    <span class="text-white font-bold text-lg hidden sm:inline">Tasker's</span>
                </a>
                <a href="index.html" class="flex items-center gap-2 text-white/80 hover:text-white transition bg-white/10 px-3 py-2 rounded-xl text-sm">
                    <i class="fas fa-arrow-left"></i>
                    <span class="hidden sm:inline">Volver</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Contenedor principal -->
    <div class="registro-container">
        
        <!-- Steps indicator -->
        <div class="flex justify-center items-center gap-3 mb-6">
            <div class="step active">1</div>
            <div class="w-12 h-0.5 bg-white/30"></div>
            <div class="step">2</div>
            <div class="w-12 h-0.5 bg-white/30"></div>
            <div class="step">3</div>
        </div>

        <!-- Tarjeta de Registro -->
        <div class="glass-card p-6">
            
            <!-- Header -->
            <div class="text-center mb-5">
                <div class="inline-block p-3 bg-blue-100 rounded-2xl mb-3">
                    <i class="fas fa-user-plus text-2xl text-blue-600"></i>
                </div>
                <h1 class="text-2xl font-extrabold text-slate-800">Crea tu cuenta</h1>
                <p class="text-sm text-slate-500">Únete a Tasker's y encuentra al experto ideal</p>
            </div>

            <!-- Formulario con scroll -->
            <div class="formulario-scroll">
                <form id="registerForm" class="space-y-4">
                    <!-- Nombre -->
                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-400 mb-1 tracking-wider">
                            <i class="fas fa-user mr-1"></i> Nombre Completo *
                        </label>
                        <input type="text" id="fullName" required 
                            class="input-moderno w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition"
                            placeholder="Ej. Juan Pérez García">
                    </div>

                    <!-- Teléfono -->
                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-400 mb-1 tracking-wider">
                            <i class="fas fa-phone mr-1"></i> Teléfono *
                        </label>
                        <input type="tel" id="phone" required 
                            class="input-moderno w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition"
                            placeholder="Ej. 5512345678">
                    </div>

                    <!-- Email -->
                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-400 mb-1 tracking-wider">
                            <i class="fas fa-envelope mr-1"></i> Correo Electrónico *
                        </label>
                        <input type="email" id="email" required 
                            class="input-moderno w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition"
                            placeholder="tu@email.com">
                    </div>

                    <!-- Contraseña CON OJO -->
                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-400 mb-1 tracking-wider">
                            <i class="fas fa-lock mr-1"></i> Contraseña *
                        </label>
                        <div class="relative">
                            <input type="password" id="password" required minlength="6"
                                class="input-moderno w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition pr-12"
                                placeholder="Mínimo 6 caracteres">
                            <button type="button" onclick="togglePassword('password')" 
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-blue-600 transition">
                                <i id="passwordIcon" class="fas fa-eye-slash text-lg"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Confirmar Contraseña CON OJO -->
                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-400 mb-1 tracking-wider">
                            <i class="fas fa-lock mr-1"></i> Confirmar Contraseña *
                        </label>
                        <div class="relative">
                            <input type="password" id="confirmPassword" required minlength="6"
                                class="input-moderno w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition pr-12"
                                placeholder="Repite tu contraseña">
                            <button type="button" onclick="togglePassword('confirmPassword')" 
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-blue-600 transition">
                                <i id="confirmPasswordIcon" class="fas fa-eye-slash text-lg"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Términos -->
                    <div class="flex items-start gap-2 pt-2">
                        <input type="checkbox" id="terms" required class="mt-1 w-4 h-4 text-blue-600 rounded">
                        <label class="text-xs text-slate-600">
                            Acepto los <a href="#" class="text-blue-600 hover:underline">Términos</a> y 
                            <a href="#" class="text-blue-600 hover:underline">Política de Privacidad</a>
                        </label>
                    </div>

                    <!-- Botón DENTRO del scroll pero visible -->
                    <button type="submit" id="submitBtn" 
                        class="btn-submit w-full bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-700 hover:to-blue-600 text-white py-3 rounded-xl font-bold text-base transition-all shadow-lg flex items-center justify-center gap-2">
                        <i class="fas fa-user-plus"></i> Crear cuenta
                    </button>
                </form>

                <!-- Divisor -->
                <div class="relative my-4">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-slate-200"></div>
                    </div>
                    <div class="relative flex justify-center">
                        <span class="bg-white px-3 text-xs text-slate-400">O regístrate con</span>
                    </div>
                </div>

                <!-- Proveedores -->
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="registerWithProvider('google')" 
                        class="flex items-center justify-center gap-2 px-3 py-2 border border-slate-200 rounded-xl hover:bg-slate-50 transition">
                        <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google">
                        <span class="text-sm font-medium">Google</span>
                    </button>
                    <button onclick="registerWithProvider('facebook')" 
                        class="flex items-center justify-center gap-2 px-3 py-2 border border-slate-200 rounded-xl hover:bg-slate-50 transition">
                        <img src="https://www.svgrepo.com/show/475647/facebook-color.svg" class="w-5 h-5" alt="Facebook">
                        <span class="text-sm font-medium">Facebook</span>
                    </button>
                </div>

                <!-- Enlace a login -->
                <div class="mt-4 text-center">
                    <p class="text-sm text-slate-500">
                        ¿Ya tienes cuenta? 
                        <a href="login.html" class="text-blue-600 hover:underline font-medium">Inicia sesión</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(inputId + 'Icon');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            }
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const supabase = initSupabase();
            if (!supabase) {
                mostrarToast('Error al conectar con el servidor', 'error');
                return;
            }

            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerHTML;
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                mostrarToast('Las contraseñas no coinciden', 'error');
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Creando cuenta...';

            try {
                const fullName = document.getElementById('fullName').value.trim();
                const phone = document.getElementById('phone').value.trim();
                const email = document.getElementById('email').value.trim();
                const terms = document.getElementById('terms').checked;

                if (!fullName || !phone || !email || !password) {
                    throw new Error('Todos los campos son obligatorios');
                }

                if (!terms) {
                    throw new Error('Debes aceptar los términos y condiciones');
                }

                if (password.length < 6) {
                    throw new Error('La contraseña debe tener al menos 6 caracteres');
                }

                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            full_name: fullName,
                            phone: phone,
                            role: 'client'
                        }
                    }
                });

                if (authError) throw new Error(authError.message);

                const { error: profileError } = await supabase
                    .from('profiles')
                    .insert([{
                        id: authData.user.id,
                        email: email,
                        full_name: fullName,
                        phone: phone,
                        role: 'client',
                        status: 'active',
                        created_at: new Date(),
                        updated_at: new Date()
                    }]);

                if (profileError) throw new Error('Error al crear el perfil');

                mostrarToast('✅ ¡Registro exitoso! Redirigiendo...', 'success');
                
                setTimeout(() => {
                    window.location.href = 'dashboard-cliente.html';
                }, 1500);

            } catch (error) {
                mostrarToast(error.message, 'error');
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });

        async function registerWithProvider(provider) {
            const supabase = initSupabase();
            if (!supabase) {
                mostrarToast('Error al conectar', 'error');
                return;
            }

            mostrarCarga('Conectando con ' + provider + '...');
            
            try {
                const { error } = await supabase.auth.signInWithOAuth({
                    provider: provider,
                    options: {
                        redirectTo: window.location.origin + '/dashboard-redirect.html'
                    }
                });
                
                if (error) throw error;
                ocultarCarga();
            } catch (error) {
                ocultarCarga();
                mostrarToast('Error: ' + error.message, 'error');
            }
        }
    </script>
</body>
</html>
