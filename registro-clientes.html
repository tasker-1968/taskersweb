<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Cliente | Tasker's México</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .auth-card { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input { font-size: 16px !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100">
        <div class="container mx-auto px-4 md:px-6 h-16 flex items-center justify-between">
            <a href="index.html">
               <img src="logo-taskers.png" alt="Tasker's Logo" class="h-10 w-auto">
            </a>
            <a href="index.html" class="text-slate-500 hover:text-blue-600 text-xs md:text-sm font-semibold transition">Volver</a>
        </div>
    </nav>

    <main class="flex-1 flex items-center justify-center p-4 md:p-6">
        <div class="auth-card bg-white w-full max-w-md rounded-[2rem] md:rounded-[2.5rem] shadow-xl shadow-slate-200/60 border border-slate-100 p-6 md:p-10">
            <div class="text-center mb-8 md:mb-10">
                <h1 class="text-2xl md:text-3xl font-extrabold text-slate-900 mb-2">Crea tu cuenta</h1>
                <p class="text-slate-500 text-sm">Encuentra al experto ideal para tus tareas hoy mismo.</p>
            </div>

            <form id="clientRegisterForm" class="space-y-4 md:space-y-5">
                <div>
                    <label class="block text-[10px] font-bold uppercase text-slate-400 mb-2 ml-1 tracking-widest">Nombre Completo</label>
                    <input type="text" id="clientName" required class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="Ej. Juan Pérez">
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase text-slate-400 mb-2 ml-1 tracking-widest">Número Telefónico</label>
                    <input type="tel" id="clientPhone" required class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="Ej. 5512345678">
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase text-slate-400 mb-2 ml-1 tracking-widest">Correo Electrónico</label>
                    <input type="email" id="clientEmail" required class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="tu@email.com">
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase text-slate-400 mb-2 ml-1 tracking-widest">Contraseña</label>
                    <input type="password" id="clientPass" required class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="••••••••">
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all active:scale-[0.98]">
                    Crear cuenta
                </button>
            </form>

            <div class="relative my-8 md:my-10">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-100"></div></div>
                <div class="relative flex justify-center text-[10px] uppercase"><span class="bg-white px-4 text-slate-400 font-semibold tracking-widest">O regístrate con</span></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-4">
                <button onclick="loginWithProvider('google')" class="flex items-center justify-center gap-3 px-4 py-4 border border-slate-200 rounded-2xl hover:bg-slate-50 transition text-sm font-semibold text-slate-700 active:bg-slate-100">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google"> Google
                </button>
                <button onclick="loginWithProvider('facebook')" class="flex items-center justify-center gap-3 px-4 py-4 border border-slate-200 rounded-2xl hover:bg-slate-50 transition text-sm font-semibold text-slate-700 active:bg-slate-100">
                    <img src="https://www.svgrepo.com/show/475647/facebook-color.svg" class="w-5 h-5" alt="Facebook"> Facebook
                </button>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        const SUPABASE_URL = 'https://ayhflwricnkptoinabhe.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF5aGZsd3JpY25rcHRvaW5hYmhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NTI0OTksImV4cCI6MjA4ODMyODQ5OX0.m5LaJmQVqoiBCbxYJ3ZGEV5x2c4oGjK9iHKtAfcc21M';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('clientRegisterForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "Cargando...";
            
            const email = document.getElementById('clientEmail').value;
            const password = document.getElementById('clientPass').value;
            const nombre = document.getElementById('clientName').value;
            const telefono = document.getElementById('clientPhone').value;

            // 1. Registro en Auth
            const { data: authData, error: authError } = await supabaseClient.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: {
                        full_name: nombre,
                        phone: telefono,
                        role: 'client'
                    }
                }
            });

            if (authError) {
                alert("Error: " + authError.message);
                btn.disabled = false;
                btn.innerText = "Crear cuenta";
                return;
            }

            // 2. Inserción en tabla pública 'profiles'
            if (authData.user) {
                const { error: profileError } = await supabaseClient
                    .from('profiles')
                    .insert([{
                        id: authData.user.id,
                        full_name: nombre,
                        phone: telefono,
                        role: 'client',
                        status: 'active'
                    }]);

                if (profileError) {
                    console.error("Error al crear perfil:", profileError.message);
                    alert("Cuenta creada, pero hubo un detalle al configurar el perfil. Intenta iniciar sesión.");
                } else {
                    alert("¡Registro exitoso! Ya puedes acceder.");
                }
                
                // Redirigimos directamente al Dashboard de Cliente
                window.location.href = 'dashboard-cliente.html';
            }
        };

        async function loginWithProvider(providerName) {
            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: providerName,
                options: {
                    // Redirigimos al Dashboard de Cliente tras login con redes sociales
                    redirectTo: window.location.origin + '/dashboard-cliente.html'
                }
            });

            if (error) {
                alert("Error al conectar con " + providerName + ": " + error.message);
            }
        }
    </script>
</body>
</html>
