<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Registro Cliente | Tasker's México</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * { font-family: 'Inter', sans-serif; }
        
        .hero-bg {
            background: linear-gradient(135deg, #0A2540 0%, #1B4F72 50%, #2E86C1 100%);
            min-height: 100vh;
        }
        
        .register-card {
            background: white;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        .input-field {
            transition: all 0.3s ease;
            border: 1.5px solid #e2e8f0;
        }
        
        .input-field:focus {
            border-color: #1B4F72;
            box-shadow: 0 0 0 3px rgba(27, 79, 114, 0.1);
            outline: none;
        }
        
        .btn-register {
            background: #1B4F72;
            transition: all 0.3s ease;
        }
        
        .btn-register:hover {
            background: #2E86C1;
            transform: translateY(-2px);
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-fadeInUp {
            animation: fadeInUp 0.5s ease-out;
        }
        
        @media (max-width: 768px) {
            .register-card {
                margin: 1rem;
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body class="hero-bg min-h-screen flex items-center justify-center p-4">

    <div class="container mx-auto max-w-2xl animate-fadeInUp">
        <!-- Navbar simplificada -->
        <div class="flex justify-between items-center mb-6">
            <a href="index.html" class="flex items-center gap-2">
                <img src="logo-taskers.png" alt="Tasker's" class="h-10 w-auto">
                <span class="text-white font-bold text-xl hidden sm:inline">Tasker's México</span>
            </a>
            <a href="index.html" class="text-white/80 hover:text-white transition flex items-center gap-2 bg-white/10 px-4 py-2 rounded-full text-sm">
                <i class="fas fa-arrow-left"></i> Volver
            </a>
        </div>

        <!-- Tarjeta de registro -->
        <div class="register-card p-6 md:p-8">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-[#1B4F72]/10 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-user-plus text-2xl text-[#1B4F72]"></i>
                </div>
                <h1 class="text-2xl md:text-3xl font-bold text-slate-800 mb-2">Crea tu cuenta</h1>
                <p class="text-slate-500 text-sm">Únete a Tasker's y encuentra al experto ideal</p>
            </div>

            <form id="clientRegisterForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">
                        <i class="fas fa-user mr-2 text-[#1B4F72]"></i> Nombre completo
                    </label>
                    <input type="text" id="clientName" required 
                        class="input-field w-full px-4 py-3 rounded-xl bg-slate-50 focus:bg-white transition"
                        placeholder="Ej. Juan Pérez García">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">
                        <i class="fas fa-phone mr-2 text-[#1B4F72]"></i> Teléfono
                    </label>
                    <input type="tel" id="clientPhone" required 
                        class="input-field w-full px-4 py-3 rounded-xl bg-slate-50 focus:bg-white transition"
                        placeholder="5512345678">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">
                        <i class="fas fa-envelope mr-2 text-[#1B4F72]"></i> Correo electrónico
                    </label>
                    <input type="email" id="clientEmail" required 
                        class="input-field w-full px-4 py-3 rounded-xl bg-slate-50 focus:bg-white transition"
                        placeholder="tu@email.com">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">
                        <i class="fas fa-lock mr-2 text-[#1B4F72]"></i> Contraseña
                    </label>
                    <input type="password" id="clientPass" required minlength="6"
                        class="input-field w-full px-4 py-3 rounded-xl bg-slate-50 focus:bg-white transition"
                        placeholder="Mínimo 6 caracteres">
                    <p class="text-xs text-slate-400 mt-2 flex items-center gap-1">
                        <i class="fas fa-info-circle text-[#1B4F72]"></i>
                        La contraseña debe tener al menos 6 caracteres
                    </p>
                </div>

                <div class="flex items-start gap-3 pt-2">
                    <input type="checkbox" id="terminos" required class="mt-1 w-4 h-4 rounded border-slate-300 text-[#1B4F72] focus:ring-[#1B4F72]">
                    <label class="text-xs text-slate-600">
                        Acepto los 
                        <a href="#" class="text-[#1B4F72] hover:underline font-medium">Términos y Condiciones</a> 
                        y la 
                        <a href="#" class="text-[#1B4F72] hover:underline font-medium">Política de Privacidad</a>
                    </label>
                </div>

                <button type="submit" id="submitBtn" 
                    class="btn-register w-full text-white py-3 rounded-xl font-bold text-base transition-all shadow-lg flex items-center justify-center gap-2">
                    <i class="fas fa-user-plus"></i> Crear cuenta
                </button>
            </form>

            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-slate-200"></div>
                </div>
                <div class="relative flex justify-center text-xs">
                    <span class="bg-white px-4 text-slate-400">O regístrate con</span>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button onclick="loginWithProvider('google')" 
                    class="flex items-center justify-center gap-2 px-4 py-3 rounded-xl border border-slate-200 hover:border-[#1B4F72] transition">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google">
                    <span class="text-sm font-medium text-slate-700">Google</span>
                </button>
                <button onclick="loginWithProvider('facebook')" 
                    class="flex items-center justify-center gap-2 px-4 py-3 rounded-xl border border-slate-200 hover:border-[#1B4F72] transition">
                    <img src="https://www.svgrepo.com/show/475647/facebook-color.svg" class="w-5 h-5" alt="Facebook">
                    <span class="text-sm font-medium text-slate-700">Facebook</span>
                </button>
            </div>

            <div class="mt-6 text-center">
                <p class="text-sm text-slate-500">
                    ¿Ya tienes cuenta? 
                    <a href="login.html" class="text-[#1B4F72] font-semibold hover:text-[#2E86C1] transition">Inicia sesión aquí</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        // =============================================
        // CONFIGURACIÓN SUPABASE
        // =============================================
        const SUPABASE_URL = 'https://ayhflwricnkptoinabhe.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF5aGZsd3JpY25rcHRvaW5hYmhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NTI0OTksImV4cCI6MjA4ODMyODQ5OX0.m5LaJmQVqoiBCbxYJ3ZGEV5x2c4oGjK9iHKtAfcc21M';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // =============================================
        // REGISTRO
        // =============================================
        document.getElementById('clientRegisterForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Creando cuenta...';

            try {
                const email = document.getElementById('clientEmail').value.trim();
                const password = document.getElementById('clientPass').value;
                const nombre = document.getElementById('clientName').value.trim();
                const telefono = document.getElementById('clientPhone').value.trim();

                if (!email || !password || !nombre || !telefono) {
                    throw new Error('Todos los campos son obligatorios');
                }

                if (password.length < 6) {
                    throw new Error('La contraseña debe tener al menos 6 caracteres');
                }

                if (!email.includes('@') || !email.includes('.')) {
                    throw new Error('Ingresa un correo electrónico válido');
                }

                const { data: authData, error: authError } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            full_name: nombre,
                            phone: telefono,
                            role: 'client'
                        }
                    }
                });

                if (authError) throw new Error(authError.message);

                if (!authData || !authData.user) {
                    throw new Error('No se pudo crear el usuario');
                }

                const { error: profileError } = await supabaseClient
                    .from('profiles')
                    .insert([{
                        id: authData.user.id,
                        email: email,
                        full_name: nombre,
                        phone: telefono,
                        role: 'client',
                        status: 'active',
                        created_at: new Date(),
                        updated_at: new Date()
                    }]);

                if (profileError) {
                    console.error("Error al crear perfil:", profileError);
                    if (profileError.message.includes('duplicate key')) {
                        throw new Error('Este correo electrónico ya está registrado');
                    } else {
                        throw new Error('Error al crear el perfil: ' + profileError.message);
                    }
                }

                btn.innerHTML = '<i class="fas fa-check mr-2"></i>¡Registro exitoso!';
                alert('✅ ¡Registro exitoso! Serás redirigido a tu panel.');
                
                setTimeout(() => {
                    window.location.href = 'dashboard-cliente.html';
                }, 1500);

            } catch (error) {
                console.error('Error en registro:', error);
                alert('❌ Error: ' + error.message);
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });

        async function loginWithProvider(providerName) {
            try {
                const { error } = await supabaseClient.auth.signInWithOAuth({
                    provider: providerName,
                    options: {
                        redirectTo: window.location.origin + '/dashboard-redirect.html'
                    }
                });
                if (error) throw error;
            } catch (error) {
                console.error('Error con proveedor:', error);
                alert("Error al conectar con " + providerName + ": " + error.message);
            }
        }
    </script>
</body>
</html>
