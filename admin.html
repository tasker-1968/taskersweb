<!-- admin.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin Tasker's</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        .seccion { display: none; animation: fadeIn 0.3s; }
        .seccion.activa { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .sidebar { transition: left 0.3s; }
        @media (max-width: 768px) { .sidebar { position: fixed; left: -280px; z-index: 1000; } .sidebar.abierto { left: 0; } }
    </style>
</head>
<body class="bg-slate-100">
    <button id="btnMenu" class="fixed top-4 left-4 z-50 md:hidden bg-blue-600 text-white p-3 rounded-xl shadow-lg"><i class="fas fa-bars"></i></button>
    <div class="flex h-screen">
        <aside id="sidebar" class="sidebar w-64 bg-gradient-to-b from-slate-800 to-slate-900 text-white flex flex-col fixed md:relative h-full z-50">
            <div class="p-6 border-b"><div class="text-2xl font-bold">Tasker's</div><div class="text-xs text-blue-300">Admin</div></div>
            <nav class="flex-1 p-4 space-y-2">
                <a href="#" onclick="cambiarSeccion('dashboard')" class="flex items-center gap-3 p-3 rounded-xl hover:bg-white/10"><i class="fas fa-chart-pie"></i>Dashboard</a>
                <a href="#" onclick="cambiarSeccion('clientes')" class="flex items-center gap-3 p-3 rounded-xl hover:bg-white/10"><i class="fas fa-users"></i>Clientes</a>
                <a href="#" onclick="cambiarSeccion('taskers')" class="flex items-center gap-3 p-3 rounded-xl hover:bg-white/10"><i class="fas fa-hard-hat"></i>Taskers</a>
                <a href="#" onclick="cambiarSeccion('servicios')" class="flex items-center gap-3 p-3 rounded-xl hover:bg-white/10"><i class="fas fa-briefcase"></i>Servicios</a>
                <a href="#" onclick="cambiarSeccion('pagos')" class="flex items-center gap-3 p-3 rounded-xl hover:bg-white/10"><i class="fas fa-dollar-sign"></i>Ganancias</a>
                <a href="#" onclick="cambiarSeccion('promociones')" class="flex items-center gap-3 p-3 rounded-xl hover:bg-white/10"><i class="fas fa-megaphone"></i>Promociones</a>
            </nav>
            <button onclick="cerrarSesion()" class="m-4 bg-red-600/20 hover:bg-red-600 p-3 rounded-xl"><i class="fas fa-sign-out-alt mr-2"></i>Cerrar Sesión</button>
        </aside>
        <main class="flex-1 overflow-y-auto">
            <header class="bg-white shadow-sm p-4 sticky top-0 z-20"><h2 id="titulo" class="text-xl font-bold">Dashboard</h2></header>
            <div class="p-6">
                <div id="dashboard" class="seccion activa">
                    <div class="grid md:grid-cols-4 gap-4 mb-6">
                        <div class="bg-white p-5 rounded-xl border-l-4 border-blue-500"><p>Usuarios totales</p><b id="totalUsuarios">0</b></div>
                        <div class="bg-white p-5 rounded-xl border-l-4 border-yellow-500"><p>Taskers</p><b id="totalTaskers">0</b></div>
                        <div class="bg-white p-5 rounded-xl border-l-4 border-green-500"><p>Servicios activos</p><b id="totalServicios">0</b></div>
                        <div class="bg-white p-5 rounded-xl border-l-4 border-purple-500"><p>Ganancias plataforma</p><b id="gananciasPlataforma">$0</b></div>
                    </div>
                    <div class="bg-white rounded-xl p-6"><h3 class="font-bold mb-4">Actividad reciente</h3><div id="actividadReciente"></div></div>
                </div>
                <div id="clientes" class="seccion"><div class="bg-white rounded-xl overflow-hidden"><table class="w-full"><thead class="bg-slate-50"><tr><th class="p-3">Nombre</th><th>Email</th><th>Teléfono</th><th>Acciones</th></tr></thead><tbody id="tablaClientes"></tbody></table></div></div>
                <div id="taskers" class="seccion"><div class="bg-white rounded-xl overflow-hidden"><table class="w-full"><thead class="bg-slate-50"><tr><th>Nombre</th><th>Especialidad</th><th>Documentos</th><th>Acciones</th></tr></thead><tbody id="tablaTaskers"></tbody></table></div></div>
                <div id="servicios" class="seccion"><div id="listaServiciosAdmin"></div></div>
                <div id="pagos" class="seccion"><div><canvas id="graficaGanancias" width="400" height="200"></canvas><div id="detallePagos"></div></div></div>
                <div id="promociones" class="seccion"><div class="bg-white rounded-xl p-6"><h3>Enviar promoción a todos</h3><textarea id="mensajePromo" class="w-full p-3 border rounded-xl mt-2" rows="3"></textarea><button onclick="enviarPromocion()" class="mt-3 bg-blue-600 text-white px-6 py-2 rounded">Enviar</button></div></div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const supabase = window.supabase.createClient('https://ayhflwricnkptoinabhe.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF5aGZsd3JpY25rcHRvaW5hYmhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NTI0OTksImV4cCI6MjA4ODMyODQ5OX0.m5LaJmQVqoiBCbxYJ3ZGEV5x2c4oGjK9iHKtAfcc21M');
        let usuarioAdmin = null;

        async function init() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) window.location.href = 'login.html';
            const { data: perfil } = await supabase.from('profiles').select('*').eq('id', session.user.id).single();
            if (perfil.role !== 'admin') { alert('No autorizado'); window.location.href = 'index.html'; }
            usuarioAdmin = perfil;
            cargarDashboard();
            cargarClientes();
            cargarTaskers();
            cargarServicios();
            cargarPagos();
        }

        async function cargarDashboard() {
            const { count: totalUsers } = await supabase.from('profiles').select('*', { count: 'exact' });
            const { count: totalTaskers } = await supabase.from('profiles').select('*', { count: 'exact' }).eq('role', 'tasker');
            const { count: serviciosActivos } = await supabase.from('servicios').select('*', { count: 'exact' }).in('status', ['buscando','asignado','en_progreso']);
            const { data: pagos } = await supabase.from('pagos').select('comision_taskers');
            const ganancias = pagos?.reduce((a,b)=>a+(b.comision_taskers||0),0) || 0;
            document.getElementById('totalUsuarios').innerText = totalUsers;
            document.getElementById('totalTaskers').innerText = totalTaskers;
            document.getElementById('totalServicios').innerText = serviciosActivos;
            document.getElementById('gananciasPlataforma').innerText = `$${ganancias.toFixed(2)}`;
            const { data: recientes } = await supabase.from('servicios').select('*, profiles(full_name)').order('created_at',false).limit(5);
            document.getElementById('actividadReciente').innerHTML = recientes.map(s => `<div class="border-b p-2">${s.subcategoria} - ${s.status} por ${s.profiles?.full_name}</div>`).join('');
        }

        async function cargarClientes() {
            const { data } = await supabase.from('profiles').select('*').eq('role', 'cliente');
            document.getElementById('tablaClientes').innerHTML = data.map(c => `<tr class="border-b"><td class="p-3">${c.full_name}</td><td>${c.email}</td><td>${c.phone}</td><td><button onclick="verDetalle('${c.id}')" class="text-blue-600">Ver</button> <button onclick="amonestar('${c.id}')" class="text-red-600">Amonestar</button></td></tr>`).join('');
        }

        async function cargarTaskers() {
            const { data } = await supabase.from('profiles').select('*').eq('role', 'tasker');
            document.getElementById('tablaTaskers').innerHTML = data.map(t => `<tr class="border-b"><td class="p-3">${t.full_name}</td><td>${t.especialidad}</td><td><a href="${t.document_ine_url}" target="_blank">INE</a> | <a href="${t.document_penal_url}" target="_blank">Penal</a></td><td><button onclick="suspenderTasker('${t.id}')" class="text-red-600">Suspender</button></td></tr>`).join('');
        }

        async function cargarServicios() {
            const { data } = await supabase.from('servicios').select('*, cliente:profiles!cliente_id(full_name), tasker:profiles!tasker_id(full_name)').order('created_at',false);
            document.getElementById('listaServiciosAdmin').innerHTML = data.map(s => `<div class="bg-white p-4 rounded-xl mb-3"><b>${s.subcategoria}</b> - Cliente: ${s.cliente?.full_name} - Tasker: ${s.tasker?.full_name || 'Sin asignar'} - Estado: ${s.status}</div>`).join('');
        }

        async function cargarPagos() {
            const { data } = await supabase.from('pagos').select('*, servicio:servicios(subcategoria)');
            const totalPorMes = {};
            data.forEach(p => { const mes = new Date(p.fecha_pago).toLocaleString('default', { month: 'short' }); totalPorMes[mes] = (totalPorMes[mes]||0) + p.comision_taskers; });
            new Chart(document.getElementById('graficaGanancias'), { type: 'bar', data: { labels: Object.keys(totalPorMes), datasets: [{ label: 'Comisiones', data: Object.values(totalPorMes), backgroundColor: '#3b82f6' }] } });
            document.getElementById('detallePagos').innerHTML = data.map(p => `<div class="border-b p-2">${p.servicio?.subcategoria} - $${p.comision_taskers} - ${new Date(p.fecha_pago).toLocaleDateString()}</div>`).join('');
        }

        window.enviarPromocion = async () => {
            const mensaje = document.getElementById('mensajePromo').value;
            const { data: usuarios } = await supabase.from('profiles').select('id');
            for (const u of usuarios) await supabase.from('notificaciones').insert({ usuario_id: u.id, titulo: 'Promoción', mensaje });
            alert('Promoción enviada a todos');
        };

        window.amonestar = async (id) => { await supabase.from('notificaciones').insert({ usuario_id: id, titulo: 'Amonestación', mensaje: 'Incumplimiento de normas' }); alert('Amonestación enviada'); };
        window.suspenderTasker = async (id) => { await supabase.from('profiles').update({ status: 'suspendido' }).eq('id', id); alert('Tasker suspendido'); cargarTaskers(); };
        window.verDetalle = (id) => alert('Función de detalle en desarrollo');
        function cambiarSeccion(sec) { document.querySelectorAll('.seccion').forEach(s => s.classList.remove('activa')); document.getElementById(sec).classList.add('activa'); document.getElementById('titulo').innerText = sec.charAt(0).toUpperCase() + sec.slice(1); if(window.innerWidth<768) document.getElementById('sidebar').classList.remove('abierto'); if(sec === 'dashboard') cargarDashboard(); if(sec === 'clientes') cargarClientes(); if(sec === 'taskers') cargarTaskers(); if(sec === 'servicios') cargarServicios(); if(sec === 'pagos') cargarPagos(); }
        document.getElementById('btnMenu').onclick = () => document.getElementById('sidebar').classList.toggle('abierto');
        window.cerrarSesion = async () => { await supabase.auth.signOut(); window.location.href = 'index.html'; };
        init();
    </script>
</body>
</html>
