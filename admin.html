<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración | Tasker's México</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-100 font-sans">

    <nav class="bg-slate-900 text-white p-6 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg"><i class="fas fa-user-shield text-xl"></i></div>
                <h1 class="text-xl font-black italic tracking-tighter">ADMIN <span class="text-blue-500">TASKERS</span></h1>
            </div>
            <button onclick="cerrarSesion()" class="text-sm font-bold bg-slate-800 px-4 py-2 rounded-lg hover:bg-red-600 transition">Cerrar Sesión</button>
        </div>
    </nav>

    <main class="container mx-auto p-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <p class="text-slate-500 text-sm">Pendientes</p>
                <h2 id="count_pending" class="text-3xl font-bold">0</h2>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <p class="text-slate-500 text-sm">Verificados</p>
                <h2 id="count_verified" class="text-3xl font-bold">0</h2>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <p class="text-slate-500 text-sm">Total Usuarios</p>
                <h2 id="count_total" class="text-3xl font-bold">0</h2>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-100">
                        <tr>
                            <th class="p-4 text-sm font-bold text-slate-600">Nombre</th>
                            <th class="p-4 text-sm font-bold text-slate-600">Email</th>
                            <th class="p-4 text-sm font-bold text-slate-600">Estado</th>
                            <th class="p-4 text-sm font-bold text-slate-600">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="taskers_table">
                        <tr><td colspan="4" class="text-center p-8 text-slate-400">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="config.js"></script>
    <script>
        // Verificar que el usuario es admin
        async function verificarAdmin() {
            const session = await checkAuth('login.html');
            if (!session) return;

            const { data: profile, error } = await supabase
                .from('profiles')
                .select('role')
                .eq('id', session.user.id)
                .single();

            if (error || profile?.role !== 'admin') {
                alert('Acceso no autorizado');
                window.location.href = 'index.html';
            }
        }

        async function cargarTaskers() {
            try {
                const { data: taskers, error } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('role', 'tasker')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                const table = document.getElementById('taskers_table');
                if (!taskers || taskers.length === 0) {
                    table.innerHTML = '<tr><td colspan="4" class="text-center p-8 text-slate-400">No hay taskers registrados</td></tr>';
                    return;
                }

                table.innerHTML = '';
                let pending = 0, verified = 0;

                taskers.forEach(t => {
                    if(t.status === 'pending') pending++;
                    if(t.status === 'verified') verified++;
                    
                    table.innerHTML += `
                        <tr class="border-b border-slate-50 hover:bg-slate-50">
                            <td class="p-4 font-bold">${t.full_name || 'Sin nombre'}</td>
                            <td class="p-4 text-slate-600">${t.email || 'No especificado'}</td>
                            <td class="p-4">
                                <span class="px-3 py-1 rounded-full text-xs font-bold 
                                    ${t.status === 'verified' ? 'bg-green-100 text-green-700' : 
                                      t.status === 'pending' ? 'bg-amber-100 text-amber-700' : 
                                      'bg-red-100 text-red-700'}">
                                    ${t.status || 'pending'}
                                </span>
                            </td>
                            <td class="p-4">
                                ${t.status === 'pending' ? 
                                    `<button onclick="verificarTasker('${t.id}')" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-blue-700 transition">
                                        <i class="fas fa-check mr-1"></i>Aprobar
                                    </button>` : 
                                    t.status === 'verified' ?
                                    `<span class="text-green-600 text-xs font-bold"><i class="fas fa-check-circle mr-1"></i>Verificado</span>` :
                                    `<span class="text-red-400 text-xs">Rechazado</span>`
                                }
                            </td>
                        </tr>`;
                });

                document.getElementById('count_pending').innerText = pending;
                document.getElementById('count_verified').innerText = verified;
                document.getElementById('count_total').innerText = taskers.length;
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('taskers_table').innerHTML = 
                    '<tr><td colspan="4" class="text-center p-8 text-red-400">Error al cargar datos</td></tr>';
            }
        }

        async function verificarTasker(id) {
            if (!confirm('¿Estás seguro de aprobar este tasker?')) return;
            
            try {
                const { error } = await supabase
                    .from('profiles')
                    .update({ status: 'verified', updated_at: new Date() })
                    .eq('id', id);

                if (error) throw error;
                
                alert('Tasker verificado exitosamente');
                cargarTaskers();
            } catch (error) {
                alert("Error: " + error.message);
            }
        }

        async function cerrarSesion() {
            await supabase.auth.signOut();
            window.location.href = 'login.html';
        }

        // Inicializar
        verificarAdmin().then(() => cargarTaskers());
    </script>
</body>
</html>
