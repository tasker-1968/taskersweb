<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Registro Tasker | Tasker's México</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #3b82f6 100%);
            min-height: 100vh;
        }
        
        .registro-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 80px 16px 32px;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 32px;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }
        
        .formulario-scroll {
            max-height: 58vh;
            overflow-y: auto;
            padding-right: 12px;
            margin-right: -4px;
        }
        
        .formulario-scroll::-webkit-scrollbar {
            width: 5px;
        }
        
        .formulario-scroll::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 10px;
        }
        
        .formulario-scroll::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 10px;
        }
        
        .input-moderno {
            transition: all 0.2s ease;
        }
        
        .input-moderno:focus {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(59, 130, 246, 0.4);
        }
        
        .file-upload {
            border: 2px dashed #e2e8f0;
            transition: all 0.3s ease;
            cursor: pointer;
            background: #f8fafc;
        }
        
        .file-upload:hover {
            border-color: #3b82f6;
            background: #eff6ff;
        }
        
        .file-upload.has-file {
            border-color: #10b981;
            background: #f0fdf4;
        }
        
        @media (max-width: 640px) {
            .registro-container {
                padding: 70px 12px 20px;
            }
            .formulario-scroll {
                max-height: 52vh;
            }
            .glass-card {
                padding: 20px;
            }
        }
        
        @media (min-width: 641px) and (max-width: 1024px) {
            .formulario-scroll {
                max-height: 55vh;
            }
        }
        
        @media (min-width: 1025px) {
            .formulario-scroll {
                max-height: 60vh;
            }
        }
        
        .step {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            color: white;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .step.active {
            background: #3b82f6;
            transform: scale(1.1);
        }
        
        .animate-slideIn {
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>

    <nav class="fixed top-0 left-0 right-0 z-50 bg-white/10 backdrop-blur-md border-b border-white/20">
        <div class="container mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <a href="index.html" class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-gradient-to-r from-blue-500 to-blue-600 rounded-lg flex items-center justify-center">
                        <span class="text-white font-bold text-lg">T</span>
                    </div>
                    <span class="text-white font-bold text-lg hidden sm:inline">Tasker's</span>
                </a>
                <a href="index.html" class="flex items-center gap-2 text-white/80 hover:text-white transition bg-white/10 px-3 py-2 rounded-xl text-sm">
                    <i class="fas fa-arrow-left"></i>
                    <span class="hidden sm:inline">Volver</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="registro-container">
        
        <div class="flex justify-center items-center gap-3 mb-6">
            <div class="step active">1</div>
            <div class="w-12 h-0.5 bg-white/30"></div>
            <div class="step">2</div>
            <div class="w-12 h-0.5 bg-white/30"></div>
            <div class="step">3</div>
        </div>

        <div class="glass-card p-6">
            
            <div class="text-center mb-5">
                <div class="inline-block p-3 bg-blue-100 rounded-2xl mb-3">
                    <i class="fas fa-briefcase text-2xl text-blue-600"></i>
                </div>
                <h1 class="text-2xl font-extrabold text-slate-800">Conviértete en Tasker</h1>
                <p class="text-sm text-slate-500">Completa tu registro y comienza a ofrecer tus servicios</p>
            </div>

            <div class="formulario-scroll">
                <form id="registerForm" class="space-y-5">
                    
                    <!-- Datos personales -->
                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Nombre completo *</label>
                        <input type="text" id="fullName" required 
                            class="input-moderno w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition"
                            placeholder="Ej: Juan Carlos Pérez García">
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Correo electrónico *</label>
                        <input type="email" id="email" required 
                            class="input-moderno w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition"
                            placeholder="tucorreo@ejemplo.com">
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Teléfono *</label>
                        <input type="tel" id="phone" required 
                            class="input-moderno w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition"
                            placeholder="5512345678">
                    </div>

                    <!-- Contraseña -->
                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Contraseña *</label>
                        <div class="relative">
                            <input type="password" id="password" required minlength="6"
                                class="input-moderno w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition pr-12"
                                placeholder="Mínimo 6 caracteres">
                            <button type="button" onclick="togglePassword('password')" 
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-blue-600 transition">
                                <i id="passwordIcon" class="fas fa-eye-slash text-lg"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Confirmar Contraseña -->
                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Confirmar Contraseña *</label>
                        <div class="relative">
                            <input type="password" id="confirmPassword" required minlength="6"
                                class="input-moderno w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition pr-12"
                                placeholder="Repite tu contraseña">
                            <button type="button" onclick="togglePassword('confirmPassword')" 
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-blue-600 transition">
                                <i id="confirmPasswordIcon" class="fas fa-eye-slash text-lg"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Documentos -->
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                        <div class="file-upload p-3 rounded-xl text-center" onclick="document.getElementById('filePhoto').click()">
                            <i class="fas fa-camera text-xl text-slate-400 mb-1"></i>
                            <p class="text-xs font-medium">Foto</p>
                            <input type="file" id="filePhoto" accept="image/*" class="hidden" required>
                            <div id="photoName" class="text-xs text-green-600 mt-1 hidden"></div>
                        </div>
                        <div class="file-upload p-3 rounded-xl text-center" onclick="document.getElementById('fileINE').click()">
                            <i class="fas fa-id-card text-xl text-slate-400 mb-1"></i>
                            <p class="text-xs font-medium">INE</p>
                            <input type="file" id="fileINE" accept=".pdf,image/*" class="hidden" required>
                            <div id="ineName" class="text-xs text-green-600 mt-1 hidden"></div>
                        </div>
                        <div class="file-upload p-3 rounded-xl text-center" onclick="document.getElementById('filePenal').click()">
                            <i class="fas fa-gavel text-xl text-slate-400 mb-1"></i>
                            <p class="text-xs font-medium">Antecedentes</p>
                            <input type="file" id="filePenal" accept=".pdf,image/*" class="hidden" required>
                            <div id="penalName" class="text-xs text-green-600 mt-1 hidden"></div>
                        </div>
                    </div>

                    <!-- Términos -->
                    <div class="flex items-start gap-2">
                        <input type="checkbox" id="terms" required class="mt-1 w-4 h-4 text-blue-600 rounded">
                        <label class="text-xs text-slate-600">
                            Acepto <a href="#" class="text-blue-600 hover:underline">Términos</a> y 
                            <a href="#" class="text-blue-600 hover:underline">Política de Privacidad</a>
                        </label>
                    </div>

                    <!-- Botón -->
                    <button type="submit" id="submitBtn" 
                        class="w-full bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-700 hover:to-blue-600 text-white py-3 rounded-xl font-bold text-base transition-all shadow-lg flex items-center justify-center gap-2">
                        <i class="fas fa-briefcase"></i> Completar registro
                    </button>
                </form>

                <div class="mt-4 text-center">
                    <p class="text-sm text-slate-500">
                        ¿Ya tienes cuenta? 
                        <a href="login.html" class="text-blue-600 hover:underline font-medium">Inicia sesión</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(inputId + 'Icon');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            }
        }

        function setupFileInput(id, nameId) {
            const input = document.getElementById(id);
            const nameSpan = document.getElementById(nameId);
            
            if (input) {
                input.addEventListener('change', function() {
                    const div = this.closest('.file-upload');
                    if (this.files && this.files[0]) {
                        div.classList.add('has-file');
                        nameSpan.textContent = '✓ ' + this.files[0].name.substring(0, 20);
                        nameSpan.classList.remove('hidden');
                    } else {
                        div.classList.remove('has-file');
                        nameSpan.classList.add('hidden');
                    }
                });
            }
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const supabase = initSupabase();
            if (!supabase) {
                mostrarToast('Error al conectar', 'error');
                return;
            }

            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerHTML;
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                mostrarToast('Las contraseñas no coinciden', 'error');
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Procesando...';

            try {
                const fullName = document.getElementById('fullName').value.trim();
                const email = document.getElementById('email').value.trim();
                const phone = document.getElementById('phone').value.trim();
                const terms = document.getElementById('terms').checked;
                const filePhoto = document.getElementById('filePhoto').files[0];
                const fileINE = document.getElementById('fileINE').files[0];
                const filePenal = document.getElementById('filePenal').files[0];

                if (!fullName || !email || !phone || !password) throw new Error('Completa todos los campos');
                if (!terms) throw new Error('Acepta los términos');
                if (!filePhoto || !fileINE || !filePenal) throw new Error('Sube todos los documentos');

                mostrarCarga('Creando cuenta...');

                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email, password,
                    options: { data: { full_name: fullName, phone, role: 'tasker' } }
                });

                if (authError) throw new Error(authError.message);

                const userId = authData.user.id;
                const fileUrls = {};

                const files = [
                    { id: 'photo', file: filePhoto, key: 'photo_url' },
                    { id: 'ine', file: fileINE, key: 'document_ine_url' },
                    { id: 'penal', file: filePenal, key: 'document_penal_url' }
                ];

                for (const f of files) {
                    const fileName = `${userId}/${f.id}_${Date.now()}.${f.file.name.split('.').pop()}`;
                    await supabase.storage.from('taskers-documents').upload(fileName, f.file);
                    const { data: { publicUrl } } = supabase.storage.from('taskers-documents').getPublicUrl(fileName);
                    fileUrls[f.key] = publicUrl;
                }

                await supabase.from('profiles').insert([{
                    id: userId, email, full_name: fullName, phone,
                    role: 'tasker', status: 'pending',
                    photo_url: fileUrls.photo_url,
                    document_ine_url: fileUrls.document_ine_url,
                    document_penal_url: fileUrls.document_penal_url,
                    created_at: new Date(), updated_at: new Date()
                }]);

                ocultarCarga();
                mostrarToast('✅ Registro exitoso', 'success');
                setTimeout(() => window.location.href = 'login.html', 1500);

            } catch (error) {
                ocultarCarga();
                mostrarToast(error.message, 'error');
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });

        setupFileInput('filePhoto', 'photoName');
        setupFileInput('fileINE', 'ineName');
        setupFileInput('filePenal', 'penalName');
    </script>
</body>
</html>
